<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>RE:ALITY — Профессии</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b0b1e;--bg2:#131336;--bg3:#1b1b4a;--bg4:#252560;
  --pri:#ffd700;--sec:#00e5ff;--acc:#ff4d9a;--grn:#00ff87;--red:#ff3b3b;
  --txt:#d8d8ff;--txt2:#6a6a99;
  --glow:0 0 10px rgba(255,215,0,0.3);
}
body{
  font-family:'Press Start 2P',monospace;background:var(--bg);color:var(--txt);
  max-width:420px;margin:0 auto;min-height:100vh;overflow-x:hidden;
  user-select:none;-webkit-tap-highlight-color:transparent;
  background-image:
    radial-gradient(1px 1px at 20px 30px,rgba(255,255,255,0.15),transparent),
    radial-gradient(1px 1px at 40px 70px,rgba(255,255,255,0.1),transparent),
    radial-gradient(1px 1px at 50px 160px,rgba(255,255,255,0.12),transparent),
    radial-gradient(1px 1px at 90px 40px,rgba(255,255,255,0.08),transparent),
    radial-gradient(1.5px 1.5px at 130px 80px,rgba(0,229,255,0.15),transparent),
    radial-gradient(1px 1px at 160px 120px,rgba(255,255,255,0.1),transparent),
    radial-gradient(1px 1px at 200px 50px,rgba(255,215,0,0.1),transparent),
    radial-gradient(1px 1px at 280px 90px,rgba(255,255,255,0.08),transparent),
    radial-gradient(1.5px 1.5px at 320px 150px,rgba(255,77,154,0.12),transparent),
    radial-gradient(1px 1px at 370px 30px,rgba(255,255,255,0.1),transparent);
  background-size:400px 200px;
  animation:starScroll 60s linear infinite;
}
@keyframes starScroll{0%{background-position:0 0}100%{background-position:0 600px}}
input,textarea,select{font-family:'Press Start 2P',monospace}

.pixel-box{background:var(--bg2);border:2px solid var(--bg4);border-radius:4px;padding:10px;margin:6px 8px;
  box-shadow:0 2px 12px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.03)}
.btn{font-family:'Press Start 2P',monospace;background:var(--bg3);color:var(--pri);
  border:2px solid var(--pri);padding:10px 14px;font-size:9px;cursor:pointer;
  border-radius:3px;transition:all .15s;text-align:center;width:100%;
  box-shadow:0 2px 0 rgba(0,0,0,0.5)}
.btn:active{transform:translateY(2px);box-shadow:none}
.btn:disabled{opacity:.35;cursor:default}
.btn.acc{border-color:var(--acc);color:var(--acc)}
.btn.grn{border-color:var(--grn);color:var(--grn)}
.btn.sec{border-color:var(--sec);color:var(--sec)}
.btn.filled{background:var(--pri);color:var(--bg);border-color:var(--pri)}
.btn.filled:active{background:#ccac00}

.bar{width:100%;height:8px;background:var(--bg);border-radius:4px;overflow:hidden;border:1px solid var(--bg4)}
.bar .fill{height:100%;border-radius:3px;transition:width .3s}
.bar .fill.xp{background:linear-gradient(90deg,#0066ff,var(--sec))}
.bar .fill.en{background:linear-gradient(90deg,#00aa44,var(--grn))}
.bar .fill.prog{background:linear-gradient(90deg,var(--pri),#ffaa00)}

.screen{display:none;flex-direction:column;min-height:100vh;padding-bottom:62px}
.screen.active{display:flex}

#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;
  display:flex;background:var(--bg2);border-top:2px solid var(--bg4);z-index:100;
  box-shadow:0 -4px 20px rgba(0,0,0,0.5)}
#nav .nb{flex:1;padding:7px 2px;text-align:center;font-family:'Press Start 2P',monospace;
  font-size:6px;color:var(--txt2);background:none;border:none;cursor:pointer;transition:.2s}
#nav .nb.on{color:var(--pri);background:var(--bg3)}
#nav .nb i{display:block;font-size:14px;margin-bottom:1px;font-style:normal}

/* Регистрация */
#reg-screen{justify-content:center;align-items:center;padding:14px}
#reg-screen h1{font-size:18px;color:var(--pri);text-align:center;text-shadow:0 0 20px rgba(255,215,0,0.4)}
.reg-sub{font-size:7px;color:var(--sec);text-align:center;margin:4px 0 14px;letter-spacing:2px}
.av-sel{display:flex;gap:10px;justify-content:center;margin:10px 0}
.av-opt{width:72px;height:72px;border:2px solid var(--bg4);cursor:pointer;border-radius:4px;
  background:var(--bg3);padding:4px;transition:.2s;image-rendering:pixelated}
.av-opt.sel{border-color:var(--pri);box-shadow:var(--glow);transform:scale(1.08)}
.av-opt img{width:100%;height:100%;image-rendering:pixelated;object-fit:contain}
.nm-inp{width:100%;background:var(--bg);border:2px solid var(--bg4);color:var(--txt);
  padding:10px;font-size:11px;text-align:center;border-radius:3px;outline:none}
.nm-inp:focus{border-color:var(--sec)}
.st-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:8px 0}
.st-item{background:var(--bg3);border:1px solid var(--bg4);padding:8px;text-align:center;border-radius:3px}
.st-item .sn{font-size:6px;color:var(--sec);margin-bottom:5px;display:block}
.st-item .sc{display:flex;align-items:center;justify-content:center;gap:6px}
.st-item .sv{font-size:14px;color:var(--pri);min-width:20px}
.st-item button{width:26px;height:26px;background:var(--bg);color:var(--pri);
  border:1px solid var(--pri);cursor:pointer;font-size:12px;border-radius:2px;
  display:flex;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace}
.st-item button:disabled{opacity:.25}
.pts{font-size:8px;color:var(--acc);text-align:center;margin:4px 0}

/* Главная */
#main-screen{padding:6px}
.top-bar{display:flex;align-items:center;gap:6px;padding:4px 8px}
.top-bar img{width:36px;height:36px;image-rendering:pixelated;border:2px solid var(--pri);border-radius:3px}
.top-bar .info{flex:1}
.top-bar .uname{font-size:9px;color:var(--pri)}
.top-bar .ulvl{font-size:6px;color:var(--sec);margin-top:1px}

.en-bar-wrap{padding:2px 8px;display:flex;align-items:center;gap:6px}
.en-bar-wrap .bar{flex:1;height:6px}
.en-bar-wrap span{font-size:5px;color:var(--txt2);min-width:45px;text-align:right}

.xp-wrap{padding:2px 8px;display:flex;align-items:center;gap:6px}
.xp-wrap .bar{flex:1}
.xp-wrap span{font-size:5px;color:var(--txt2);min-width:50px;text-align:right}

.res-bar{display:flex;gap:4px;padding:4px 8px}
.res{background:var(--bg3);border:1px solid var(--bg4);padding:5px 8px;font-size:6px;
  display:flex;align-items:center;gap:3px;flex:1;border-radius:3px}
.res .rv{color:var(--pri)}

.tap-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px;min-height:280px;position:relative;touch-action:manipulation}
.tap-char{width:130px;height:130px;image-rendering:pixelated;cursor:pointer;
  animation:breathe 2.5s ease-in-out infinite;filter:drop-shadow(0 0 15px rgba(255,215,0,0.2))}
.tap-char:active{animation:none;transform:scale(.92)}
@keyframes breathe{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.025)}}

.mult-display{font-size:18px;color:var(--pri);text-align:center;margin-top:6px;min-height:24px;
  text-shadow:0 0 10px rgba(255,215,0,0.5);transition:all .15s}
.mult-display.hot{color:var(--acc);text-shadow:0 0 15px rgba(255,77,154,0.6)}
.mult-display.fire{color:var(--red);text-shadow:0 0 20px rgba(255,59,59,0.7);animation:pulse .3s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

.coin-pop{position:absolute;font-size:11px;color:var(--pri);pointer-events:none;
  animation:coinUp .7s ease-out forwards;text-shadow:1px 1px 0 #000;z-index:50;font-family:'Press Start 2P',monospace}
@keyframes coinUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-50px) scale(1.2)}}

/* Профессии */
#prof-screen{padding:6px}
.scr-title{font-size:11px;color:var(--pri);text-align:center;margin:8px;text-shadow:0 0 10px rgba(255,215,0,0.3)}
.sph-list{display:flex;flex-direction:column;gap:6px;padding:2px 4px}
.sph-card{background:var(--bg2);border:2px solid var(--bg4);padding:10px;cursor:pointer;
  display:flex;align-items:center;gap:10px;border-radius:4px;transition:.2s}
.sph-card:active{border-color:var(--pri);transform:scale(.98)}
.sph-card .si{font-size:24px}.sph-card .sn{font-size:8px;color:var(--txt)}
.sph-card .sc{font-size:6px;color:var(--txt2);margin-top:2px}

.prof-list{display:flex;flex-direction:column;gap:5px;padding:2px}
.prof-card{background:var(--bg3);border:1px solid var(--bg4);padding:10px;
  display:flex;align-items:center;gap:8px;cursor:pointer;border-radius:3px;transition:.2s}
.prof-card.open{border-color:var(--grn)}
.prof-card .pi{font-size:20px}.prof-card .pn{font-size:7px}
.prof-card .ps{font-size:5px;margin-top:2px}
.prof-card .ps.lk{color:var(--acc)}.prof-card .ps.op{color:var(--grn)}

.back-b{background:none;border:none;color:var(--sec);font-family:'Press Start 2P',monospace;
  font-size:7px;cursor:pointer;padding:6px;display:flex;align-items:center;gap:3px}

.pd-hdr{text-align:center;margin:6px 0}
.pd-hdr .pdi{font-size:36px}.pd-hdr .pdn{font-size:10px;color:var(--pri);margin:5px 0}
.pd-hdr .pdd{font-size:6px;color:var(--txt2);line-height:1.6}
.pd-tools{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin:8px 0}
.pd-tools span{background:var(--bg);border:1px solid var(--sec);color:var(--sec);
  font-size:5px;padding:3px 6px;border-radius:2px}

.prog-section{padding:4px 8px;margin:4px 0}
.prog-label{font-size:6px;color:var(--txt2);margin-bottom:3px;display:flex;justify-content:space-between}

.task-list{display:flex;flex-direction:column;gap:5px}
.task-card{background:var(--bg3);border:1px solid var(--bg4);padding:9px;cursor:pointer;
  display:flex;align-items:center;gap:7px;border-radius:3px;transition:.2s}
.task-card.done{border-color:var(--grn);opacity:.65}
.task-card.locked{opacity:.35;cursor:default}
.task-card .tn{width:24px;height:24px;border:2px solid var(--pri);display:flex;
  align-items:center;justify-content:center;font-size:9px;color:var(--pri);
  flex-shrink:0;border-radius:2px}
.task-card.done .tn{border-color:var(--grn);color:var(--grn)}
.task-card .tt{font-size:7px}.task-card .td{font-size:5px;color:var(--txt2);margin-top:2px}
.task-card .tprog{font-size:5px;color:var(--sec);margin-top:2px}

/* Улучшения */
#upg-screen{padding:6px}
.upg-list{display:flex;flex-direction:column;gap:6px;padding:2px 4px}
.upg-card{background:var(--bg2);border:2px solid var(--bg4);padding:10px;border-radius:4px;
  display:flex;flex-direction:column;gap:6px}
.upg-card .uh{display:flex;align-items:center;gap:8px}
.upg-card .ui{font-size:20px}.upg-card .un{font-size:8px}
.upg-card .ul{font-size:6px;color:var(--sec);margin-top:1px}
.upg-card .ud{font-size:6px;color:var(--txt2);line-height:1.4}

/* Задание */
#task-screen{padding:6px}
.tg-area{padding:4px}
.tg-area h3{font-size:9px;color:var(--pri);text-align:center;margin:6px 0}
.tg-area .tg-desc{font-size:6px;color:var(--txt2);text-align:center;margin-bottom:10px;line-height:1.6}
.tg-content{min-height:200px}

/* Общие элементы заданий */
.info-panel{background:var(--bg);border:1px solid var(--sec);border-radius:3px;padding:8px;
  font-size:6px;line-height:1.7;margin:6px 0;color:var(--txt)}
.info-panel b{color:var(--sec)}
.info-panel .hint{color:var(--pri);font-style:italic}

.step-indicator{display:flex;gap:3px;justify-content:center;margin:8px 0}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--bg4);border:1px solid var(--txt2)}
.step-dot.active{background:var(--pri);border-color:var(--pri);box-shadow:0 0 6px rgba(255,215,0,0.5)}
.step-dot.done{background:var(--grn);border-color:var(--grn)}

.choice-list{display:flex;flex-direction:column;gap:6px;margin:8px 0}
.choice-btn{font-family:'Press Start 2P',monospace;background:var(--bg3);border:1px solid var(--bg4);
  color:var(--txt);padding:10px;font-size:6px;text-align:left;cursor:pointer;
  border-radius:3px;transition:.2s;line-height:1.5}
.choice-btn:active{border-color:var(--pri)}
.choice-btn.correct{border-color:var(--grn);color:var(--grn);background:rgba(0,255,135,.08)}
.choice-btn.wrong{border-color:var(--red);color:var(--red);background:rgba(255,59,59,.08)}
.choice-btn.selected{border-color:var(--sec);background:rgba(0,229,255,.08)}

/* Site Builder */
.sb-workspace{display:flex;flex-direction:column;gap:4px;background:var(--bg);
  border:2px solid var(--bg4);border-radius:3px;padding:6px;min-height:200px;position:relative}
.sb-block{background:var(--bg3);border:1px solid var(--sec);border-radius:2px;
  padding:8px;font-size:6px;text-align:center;cursor:grab;touch-action:none;transition:.2s}
.sb-block.dragging{opacity:.5;border-color:var(--pri)}
.sb-block .sb-label{color:var(--sec);margin-bottom:2px;font-size:5px}
.sb-palette{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0}
.sb-piece{background:var(--bg3);border:1px solid var(--bg4);border-radius:2px;
  padding:6px 8px;font-size:5px;cursor:pointer;transition:.2s;color:var(--txt)}
.sb-piece:active{border-color:var(--pri)}
.sb-piece.used{opacity:.3;cursor:default}
.sb-preview{background:#fff;border-radius:3px;padding:6px;min-height:120px;color:#333;font-size:5px}

/* Drag items */
.drag-list{display:flex;flex-direction:column;gap:4px}
.drag-item{background:var(--bg3);border:1px solid var(--sec);border-radius:2px;
  padding:8px;font-size:6px;cursor:grab;touch-action:none;display:flex;align-items:center;
  gap:6px;line-height:1.4;transition:.2s}
.drag-item:active{border-color:var(--pri)}.drag-item.dragging{opacity:.4}
.drag-item .dh{color:var(--txt2);font-size:8px}

/* Input fields */
.game-input{width:100%;background:var(--bg);border:1px solid var(--bg4);color:var(--txt);
  padding:8px;font-size:8px;border-radius:3px;outline:none;margin:4px 0}
.game-input:focus{border-color:var(--sec)}

/* Grid/Canvas for builders */
.grid-canvas{display:grid;gap:2px;margin:6px 0;background:var(--bg);border:1px solid var(--bg4);
  border-radius:3px;padding:4px}
.grid-cell{aspect-ratio:1;border:1px solid var(--bg4);border-radius:1px;cursor:pointer;transition:.15s;
  display:flex;align-items:center;justify-content:center;font-size:8px}
.grid-cell:active{transform:scale(.9)}
.grid-cell.filled{border-color:var(--sec)}

/* Scenario result */
.task-result{text-align:center;padding:16px}
.task-result .ri{font-size:36px;margin-bottom:10px}
.task-result .rt{font-size:11px;color:var(--pri);margin-bottom:6px}
.task-result .rs{font-size:8px;color:var(--sec);margin-bottom:4px}
.task-result .rr{font-size:7px;color:var(--grn);margin-bottom:14px}

/* Модалка */
.modal-ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);
  z-index:200;justify-content:center;align-items:center;padding:14px}
.modal-ov.on{display:flex}
.modal-box{background:var(--bg2);border:2px solid var(--pri);padding:16px;max-width:320px;
  width:100%;text-align:center;border-radius:5px;box-shadow:0 0 30px rgba(255,215,0,0.15)}
.modal-box h3{font-size:9px;color:var(--pri);margin-bottom:8px}
.modal-box p{font-size:6px;color:var(--txt2);line-height:1.7;margin-bottom:12px}

/* Лоадер */
#loading{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);
  display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:999}
#loading h1{font-size:18px;color:var(--pri);text-shadow:0 0 20px rgba(255,215,0,0.4)}
#loading p{font-size:7px;color:var(--sec);animation:blink 1s infinite;margin-top:6px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
</style>
</head>
<body>
<div id="loading"><h1>RE:ALITY</h1><p>Загрузка...</p></div>
<div class="modal-ov" id="modal"><div class="modal-box" id="mcont"></div></div>

<!-- РЕГИСТРАЦИЯ -->
<div class="screen" id="reg-screen">
  <h1>RE:ALITY</h1><div class="reg-sub">ПРОФЕССИИ</div>
  <div class="pixel-box">
    <div style="font-size:7px;color:var(--sec);text-align:center;margin-bottom:8px">ВЫБЕРИ АВАТАР</div>
    <div class="av-sel">
      <div class="av-opt sel" data-a="1" onclick="selAv(1)"><img src="/hero1.png"></div>
      <div class="av-opt" data-a="2" onclick="selAv(2)"><img src="/hero2.png"></div>
      <div class="av-opt" data-a="3" onclick="selAv(3)"><img src="/hero3.png"></div>
    </div>
  </div>
  <div class="pixel-box">
    <div style="font-size:7px;color:var(--sec);text-align:center;margin-bottom:6px">ИМЯ ГЕРОЯ</div>
    <input type="text" class="nm-inp" id="nm-inp" maxlength="8" placeholder="Макс 8 букв">
  </div>
  <div class="pixel-box">
    <div style="font-size:7px;color:var(--sec);text-align:center;margin-bottom:4px">ХАРАКТЕРИСТИКИ</div>
    <div class="pts">Осталось: <span id="pts-left">0</span></div>
    <div class="st-grid">
      <div class="st-item"><span class="sn">💪 СИЛА</span><div class="sc"><button onclick="chSt('str',-1)">-</button><span class="sv" id="s-str">5</span><button onclick="chSt('str',1)">+</button></div></div>
      <div class="st-item"><span class="sn">🧠 ИНТЕЛЛЕКТ</span><div class="sc"><button onclick="chSt('int',-1)">-</button><span class="sv" id="s-int">5</span><button onclick="chSt('int',1)">+</button></div></div>
      <div class="st-item"><span class="sn">🗣 ХАРИЗМА</span><div class="sc"><button onclick="chSt('cha',-1)">-</button><span class="sv" id="s-cha">5</span><button onclick="chSt('cha',1)">+</button></div></div>
      <div class="st-item"><span class="sn">🍀 УДАЧА</span><div class="sc"><button onclick="chSt('luck',-1)">-</button><span class="sv" id="s-luck">5</span><button onclick="chSt('luck',1)">+</button></div></div>
    </div>
  </div>
  <div style="padding:6px 8px"><button class="btn filled" onclick="doReg()">⚔️ НАЧАТЬ ПУТЬ ⚔️</button></div>
</div>

<!-- ГЛАВНАЯ -->
<div class="screen" id="main-screen">
  <div class="en-bar-wrap">
    <span style="font-size:6px;color:var(--grn)">⚡</span>
    <div class="bar"><div class="fill en" id="en-bar" style="width:100%"></div></div>
    <span id="en-txt">100/100</span>
  </div>
  <div class="top-bar">
    <img id="m-av" src="/hero1.png">
    <div class="info"><div class="uname" id="m-name">...</div><div class="ulvl" id="m-lvl">УР. 1</div></div>
  </div>
  <div class="xp-wrap">
    <span style="font-size:5px;color:var(--sec)">XP</span>
    <div class="bar"><div class="fill xp" id="xp-bar" style="width:0%"></div></div>
    <span id="xp-txt">0/80</span>
  </div>
  <div class="res-bar">
    <div class="res"><span>🪙</span><span class="rv" id="r-coins">0</span></div>
    <div class="res"><span>🎫</span><span class="rv" id="r-tokens">0</span></div>
  </div>
  <div class="tap-zone" id="tap-zone">
    <img class="tap-char" id="tap-img" src="/hero1.png" draggable="false">
    <div class="mult-display" id="mult-disp"></div>
  </div>
</div>

<!-- ПРОФЕССИИ -->
<div class="screen" id="prof-screen">
  <div class="scr-title">🏢 ПРОФЕССИИ</div>
  <div id="prof-cont"></div>
</div>

<!-- УЛУЧШЕНИЯ -->
<div class="screen" id="upg-screen">
  <div class="scr-title">⬆️ УЛУЧШЕНИЯ</div>
  <div style="text-align:center;padding:2px"><div class="res" style="display:inline-flex;margin-bottom:6px"><span>🪙</span><span class="rv" id="u-coins">0</span></div></div>
  <div class="upg-list" id="upg-list"></div>
</div>

<!-- ЗАДАНИЕ -->
<div class="screen" id="task-screen">
  <button class="back-b" onclick="exitTask()">← НАЗАД</button>
  <div class="tg-area" id="tg-area"></div>
</div>

<!-- НАВ -->
<div id="nav" style="display:none">
  <button class="nb" onclick="goTo('prof')"><i>🏢</i>Профессии</button>
  <button class="nb on" onclick="goTo('main')"><i>🏠</i>Главная</button>
  <button class="nb" onclick="goTo('upg')"><i>⬆️</i>Улучшения</button>
</div>

<script>
// === СОСТОЯНИЕ ===
const S={user:null,unlocked:[],completed:[],progress:[],xpN:80,profs:[],
  tgId:0,initData:'',selAv:1,stats:{str:5,int:5,cha:5,luck:5},
  curSphere:null,curProf:null,curTask:null,enTimer:null,
  // Тап-система
  tapMult:1,tapCount:0,lastTap:0,multTimer:null,
  pendingCoins:0,pendingXp:0,pendingTaps:0,syncTimer:null,syncing:false};

// Telegram
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();S.initData=tg.initData||'';if(tg.initDataUnsafe?.user)S.tgId=tg.initDataUnsafe.user.id}
// Сохранённый ID для тестов
if(!S.tgId){
  let saved=localStorage.getItem('reality_tg_id');
  if(saved){S.tgId=parseInt(saved)}
  else{S.tgId=Math.floor(Math.random()*999999)+100000;localStorage.setItem('reality_tg_id',S.tgId+'')}
}

// === API ===
async function api(ep,body={}){
  body.tg_id=S.tgId;body.init_data=S.initData;
  const isGet=ep.includes('professions');
  try{
    const r=await fetch(ep,{method:isGet?'GET':'POST',headers:{'Content-Type':'application/json'},
      body:isGet?undefined:JSON.stringify(body)});
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.detail||'Error '+r.status)}
    return await r.json();
  }catch(e){console.error('API:',e);throw e}
}

// === ИНИЦИАЛИЗАЦИЯ ===
async function init(){
  try{
    const[pd,ad]=await Promise.all([api('/api/professions'),api('/api/auth')]);
    S.profs=pd.spheres;
    Object.assign(S,{user:ad.user,unlocked:ad.unlocked||[],completed:ad.completed||[],
      progress:ad.progress||[],xpN:ad.xp_needed});
    document.getElementById('loading').style.display='none';
    if(!S.user.registered){goTo('reg')}
    else{goTo('main');document.getElementById('nav').style.display='flex';startEnRegen()}
  }catch(e){
    document.getElementById('loading').innerHTML=`<h1>RE:ALITY</h1><p style="color:var(--red)">${e.message}</p><br><button class="btn" onclick="location.reload()" style="width:auto;padding:10px 20px">Перезагрузить</button>`;
  }
}

// === НАВИГАЦИЯ ===
function goTo(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  const map={reg:'reg-screen',main:'main-screen',prof:'prof-screen',upg:'upg-screen',task:'task-screen'};
  document.getElementById(map[n])?.classList.add('active');
  const navI={prof:0,main:1,upg:2};
  if(navI[n]!==undefined)document.querySelectorAll('.nb')[navI[n]]?.classList.add('on');
  if(n==='main')updMain();if(n==='prof')renderSpheres();if(n==='upg')renderUpg();
}

// === РЕГИСТРАЦИЯ ===
function selAv(n){S.selAv=n;document.querySelectorAll('.av-opt').forEach(e=>e.classList.toggle('sel',+e.dataset.a===n))}
function chSt(s,d){
  const t=S.stats.str+S.stats.int+S.stats.cha+S.stats.luck;const nv=S.stats[s]+d;
  if(nv<1||nv>14||( d>0&&t>=20)||(d<0&&t<=4))return;
  S.stats[s]=nv;document.getElementById('s-'+s).textContent=nv;
  document.getElementById('pts-left').textContent=20-(S.stats.str+S.stats.int+S.stats.cha+S.stats.luck);
}
async function doReg(){
  const nm=document.getElementById('nm-inp').value.trim();
  if(!nm){modal('Ошибка','Введи имя!');return}
  const t=S.stats.str+S.stats.int+S.stats.cha+S.stats.luck;
  if(t!==20){modal('Ошибка',`Распредели все 20 очков! (${t})`);return}
  try{const d=await api('/api/register',{name:nm,avatar:S.selAv,stats:S.stats});
    S.user=d.user;S.xpN=d.xp_needed;goTo('main');
    document.getElementById('nav').style.display='flex';startEnRegen();
    modal('Добро пожаловать!',nm+', тапай по персонажу и открывай профессии!');
  }catch(e){modal('Ошибка',e.message)}
}

// === ГЛАВНАЯ ===
function updMain(){
  const u=S.user;if(!u)return;
  document.getElementById('m-av').src=`/hero${u.avatar}.png`;
  document.getElementById('tap-img').src=`/hero${u.avatar}.png`;
  document.getElementById('m-name').textContent=u.name;
  document.getElementById('m-lvl').textContent=`УР. ${u.level}`;
  document.getElementById('xp-txt').textContent=`${u.xp}/${S.xpN}`;
  document.getElementById('xp-bar').style.width=Math.min(100,(u.xp/S.xpN)*100)+'%';
  document.getElementById('r-coins').textContent=fmt(u.coins);
  document.getElementById('r-tokens').textContent=u.tokens;
  document.getElementById('en-txt').textContent=`${u.energy}/${u.max_energy}`;
  document.getElementById('en-bar').style.width=(u.energy/u.max_energy)*100+'%';
}
function fmt(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return n+''}

// === ТАПАЛКА С МНОЖИТЕЛЕМ ===
document.getElementById('tap-zone').addEventListener('pointerdown',function(e){
  e.preventDefault();if(!S.user?.registered||S.user.energy<=0)return;
  const now=Date.now();

  // Множитель: если тапнул в течение 800мс — увеличиваем
  if(now-S.lastTap<800){S.tapCount++;S.tapMult=Math.min(5,1+S.tapCount*0.1)}
  else{S.tapCount=0;S.tapMult=1}
  S.lastTap=now;

  // Сброс множителя при неактиве
  clearTimeout(S.multTimer);
  S.multTimer=setTimeout(()=>{S.tapMult=1;S.tapCount=0;updMultDisp()},1500);

  // Мгновенное начисление
  const earned=Math.floor(S.user.coins_per_tap*S.tapMult);
  const xpGain=Math.ceil(2*(1+S.user.stat_int*0.02));
  S.user.coins+=earned;S.user.xp+=xpGain;S.user.energy=Math.max(0,S.user.energy-1);
  S.pendingCoins+=earned;S.pendingXp+=xpGain;S.pendingTaps++;

  // Проверка левел-апа (клиентская)
  while(S.user.xp>=S.xpN){S.user.xp-=S.xpN;S.user.level++;S.user.tokens++;
    S.xpN=Math.floor(80*Math.pow(S.user.level,1.4));
    modal('⬆️ УРОВЕНЬ '+S.user.level+'!','Ты получил токен профессии! 🎫');
  }

  updMain();updMultDisp();coinPop(e,'+'+earned);

  // Синхронизация: отправляем каждые 600мс
  if(!S.syncTimer){S.syncTimer=setTimeout(syncTaps,600)}
});

function updMultDisp(){
  const el=document.getElementById('mult-disp');
  if(S.tapMult<=1){el.textContent='';el.className='mult-display';return}
  el.textContent='x'+S.tapMult.toFixed(1);
  el.className='mult-display'+(S.tapMult>=3?' fire':S.tapMult>=2?' hot':'');
}

async function syncTaps(){
  S.syncTimer=null;if(S.pendingTaps<=0||S.syncing)return;
  const taps=S.pendingTaps,coins=S.pendingCoins,xp=S.pendingXp;
  S.pendingTaps=0;S.pendingCoins=0;S.pendingXp=0;S.syncing=true;
  try{
    const d=await api('/api/tap',{taps,coins_earned:coins,xp_earned:xp});
    // Принимаем серверное состояние, но НЕ откатываем если у нас больше
    if(d.user.coins>=S.user.coins-10)S.user.coins=d.user.coins;
    S.user.level=d.user.level;S.user.tokens=d.user.tokens;
    S.user.energy=Math.max(S.user.energy,d.user.energy);
    S.user.xp=d.user.xp;S.xpN=d.xp_needed;updMain();
  }catch(e){console.error(e)}
  S.syncing=false;
  if(S.pendingTaps>0)S.syncTimer=setTimeout(syncTaps,600);
}

function coinPop(e,txt){
  const z=document.getElementById('tap-zone'),r=z.getBoundingClientRect();
  const p=document.createElement('div');p.className='coin-pop';p.textContent=txt;
  p.style.left=(e.clientX-r.left-12)+'px';p.style.top=(e.clientY-r.top-12)+'px';
  z.appendChild(p);setTimeout(()=>p.remove(),700);
}

// Энергия — медленная регенерация
function startEnRegen(){
  if(S.enTimer)clearInterval(S.enTimer);
  S.enTimer=setInterval(()=>{
    if(!S.user||S.user.energy>=S.user.max_energy)return;
    S.user.energy=Math.min(S.user.max_energy,S.user.energy+1);updMain();
  },2500); // 1 ед за 2.5 сек = 0.4/сек
}

// === ПРОФЕССИИ ===
function renderSpheres(){
  S.curSphere=null;S.curProf=null;
  let h='<div class="sph-list">';
  for(const s of S.profs)h+=`<div class="sph-card" onclick="openSphere('${s.id}')"><div class="si">${s.icon}</div><div><div class="sn">${s.name}</div><div class="sc">${s.professions.length} профессий</div></div></div>`;
  h+='</div>';document.getElementById('prof-cont').innerHTML=h;
}

function openSphere(sid){
  const sp=S.profs.find(s=>s.id===sid);if(!sp)return;S.curSphere=sp;
  let h=`<button class="back-b" onclick="renderSpheres()">← НАЗАД</button>`;
  h+=`<div style="text-align:center;margin:6px 0;font-size:9px;color:var(--pri)">${sp.icon} ${sp.name}</div>`;
  h+='<div class="prof-list">';
  for(const p of sp.professions){
    const open=S.unlocked.includes(p.id);
    const done=S.completed.filter(c=>c.profession_id===p.id).length;
    const total=p.tasks.length;
    const pct=open?Math.floor(done/total*100):0;
    h+=`<div class="prof-card ${open?'open':''}" onclick="openProf('${p.id}')"><div class="pi">${p.icon}</div><div style="flex:1"><div class="pn">${p.name}</div><div class="ps ${open?'op':'lk'}">${open?`✓ ${pct}% изучено (${done}/${total})`:`🔒 ${p.cost} токен`}</div></div></div>`;
  }
  h+='</div>';document.getElementById('prof-cont').innerHTML=h;
}

function openProf(pid){
  let prof=null;for(const s of S.profs){prof=s.professions.find(p=>p.id===pid);if(prof)break}
  if(!prof)return;S.curProf=prof;
  const open=S.unlocked.includes(pid);
  const myDone=S.completed.filter(c=>c.profession_id===pid);
  const pct=open?Math.floor(myDone.length/prof.tasks.length*100):0;

  let h=`<button class="back-b" onclick="openSphere('${S.curSphere.id}')">← НАЗАД</button>`;
  h+=`<div class="pd-hdr"><div class="pdi">${prof.icon}</div><div class="pdn">${prof.name}</div><div class="pdd">${prof.desc}</div></div>`;
  h+='<div class="pd-tools">';for(const t of prof.tools)h+=`<span>${t}</span>`;h+='</div>';

  if(!open){
    h+=`<div style="text-align:center;padding:14px"><div style="font-size:6px;color:var(--txt2);margin-bottom:10px">Открой, чтобы попробовать реальные задачи</div><button class="btn acc" onclick="unlockProf('${pid}')">🎫 ОТКРЫТЬ ЗА ${prof.cost} ТОКЕН</button><div style="font-size:6px;color:var(--txt2);margin-top:6px">Токенов: ${S.user.tokens}</div></div>`;
  }else{
    h+=`<div class="prog-section"><div class="prog-label"><span>ПРОГРЕСС</span><span>${pct}%</span></div><div class="bar"><div class="fill prog" style="width:${pct}%"></div></div></div>`;
    if(pct===100)h+=`<div style="text-align:center;font-size:7px;color:var(--grn);margin:6px 0">✅ ПРОФЕССИЯ ИЗУЧЕНА!</div>`;
    h+='<div style="font-size:8px;color:var(--sec);text-align:center;margin:8px 0">ЗАДАНИЯ</div>';
    h+='<div class="task-list">';
    for(let i=0;i<prof.tasks.length;i++){
      const t=prof.tasks[i];const isDone=myDone.find(c=>c.task_index===i);
      const prevOk=i===0||myDone.find(c=>c.task_index===i-1);
      const locked=!prevOk&&!isDone;
      const hasProg=S.progress.find(p=>p.profession_id===pid&&p.task_index===i);
      h+=`<div class="task-card ${isDone?'done':''} ${locked?'locked':''}" onclick="${locked?'':(isDone?'':`startTask('${pid}',${i})`)}"><div class="tn">${isDone?'✓':i+1}</div><div style="flex:1"><div class="tt">${t.title}</div><div class="td">${locked?'🔒 Выполни предыдущее':t.desc}</div>${hasProg&&!isDone?'<div class="tprog">💾 Есть сохранение</div>':''}</div></div>`;
    }
    h+='</div>';
  }
  document.getElementById('prof-cont').innerHTML=h;
}

async function unlockProf(pid){
  try{const d=await api('/api/unlock',{profession_id:pid});
    S.user=d.user;S.unlocked=d.unlocked;S.xpN=d.xp_needed;
    openProf(pid);modal('✅ Открыто!','Попробуй реальные задачи профессии!');
  }catch(e){modal('Ошибка',e.message)}
}

// === УЛУЧШЕНИЯ ===
const UPG_INFO=[
  {t:'tap',n:'💪 Сила тапа',d:'+1 монета за тап',i:'👆',f:'upg_tap_level',mx:20,bc:50,m:2},
  {t:'energy',n:'🔋 Выносливость',d:'+20 макс. энергии',i:'⚡',f:'upg_energy_level',mx:20,bc:80,m:2.2},
  {t:'multi',n:'✋ Мультитап',d:'+1 одновременный тап',i:'🖐',f:'upg_multi_level',mx:5,bc:200,m:2.5},
  {t:'regen',n:'♻️ Регенерация',d:'+0.15 энергии/сек',i:'💚',f:'upg_regen_level',mx:20,bc:100,m:2},
];
function renderUpg(){
  document.getElementById('u-coins').textContent=fmt(S.user.coins);
  let h='';
  for(const u of UPG_INFO){
    const l=S.user[u.f],maxed=l>=u.mx,cost=maxed?0:Math.floor(u.bc*Math.pow(u.m,l)),can=!maxed&&S.user.coins>=cost;
    h+=`<div class="upg-card"><div class="uh"><div class="ui">${u.i}</div><div><div class="un">${u.n}</div><div class="ul">Ур. ${l}/${u.mx}</div></div></div><div class="ud">${u.d}</div><button class="btn ${can?'grn':''}" ${can?'':'disabled'} onclick="buyUpg('${u.t}')">${maxed?'МАКС':'🪙 '+fmt(cost)}</button></div>`;
  }
  document.getElementById('upg-list').innerHTML=h;
}
async function buyUpg(t){
  try{const d=await api('/api/upgrade',{upgrade_type:t});S.user=d.user;S.xpN=d.xp_needed;renderUpg();updMain()}
  catch(e){modal('Ошибка',e.message)}
}

// ================================================================
// === СИСТЕМА ЗАДАНИЙ ===
// ================================================================

function startTask(pid,tidx){
  let prof=null;for(const s of S.profs){prof=s.professions.find(p=>p.id===pid);if(prof)break}
  if(!prof)return;
  const meta=prof.tasks[tidx];
  S.curTask={pid,tidx,meta,step:0,score:0,maxSteps:0,answers:[]};
  // Загрузить сохранённый прогресс
  const saved=S.progress.find(p=>p.profession_id===pid&&p.task_index===tidx);
  if(saved)S.curTask.saved=saved.progress_data;
  goTo('task');document.getElementById('nav').style.display='none';
  renderTaskEngine();
}

function exitTask(){
  // Сохранить прогресс если начали
  if(S.curTask&&S.curTask.step>0&&!S.curTask.finished){
    saveTaskProg({step:S.curTask.step,score:S.curTask.score,answers:S.curTask.answers});
  }
  const pid=S.curTask?.pid;S.curTask=null;
  goTo('prof');document.getElementById('nav').style.display='flex';
  if(pid&&S.curSphere){setTimeout(()=>{openSphere(S.curSphere.id);setTimeout(()=>openProf(pid),50)},50)}
}

async function saveTaskProg(data){
  if(!S.curTask)return;
  try{await api('/api/task/progress',{profession_id:S.curTask.pid,task_index:S.curTask.tidx,data})}catch(e){}
}

async function finishTask(score){
  if(!S.curTask)return;S.curTask.finished=true;
  try{
    const d=await api('/api/task/complete',{profession_id:S.curTask.pid,task_index:S.curTask.tidx,score});
    S.user=d.user;S.completed=d.completed||S.completed;S.xpN=d.xp_needed;
    // Удалить прогресс из локального кеша
    S.progress=S.progress.filter(p=>!(p.profession_id===S.curTask.pid&&p.task_index===S.curTask.tidx));
    const icon=score>=80?'🏆':score>=50?'⭐':'📝';
    const title=score>=80?'Отлично!':score>=50?'Хорошо!':'Попробуй ещё!';
    document.getElementById('tg-area').innerHTML=`<div class="task-result"><div class="ri">${icon}</div><div class="rt">${title}</div><div class="rs">Результат: ${score}%</div><div class="rr">+${d.coin_r||0} 🪙  +${d.xp_r||0} XP${d.leveled>0?' ⬆️ УРОВЕНЬ!':''}</div><button class="btn grn" onclick="exitTask()">ПРОДОЛЖИТЬ</button></div>`;
  }catch(e){modal('Ошибка',e.message)}
}

// === ДВИЖКИ ЗАДАНИЙ ===

function renderTaskEngine(){
  const{pid,tidx,meta}=S.curTask;
  const data=TASKS[pid]?.[tidx];
  if(!data){document.getElementById('tg-area').innerHTML=`<div style="text-align:center;padding:30px"><div style="font-size:8px;color:var(--txt2);margin-bottom:12px">Задание в разработке</div><button class="btn" onclick="exitTask()">Назад</button></div>`;return}
  S.curTask.data=data;S.curTask.maxSteps=data.steps.length;
  // Восстановить прогресс
  if(S.curTask.saved){S.curTask.step=S.curTask.saved.step||0;S.curTask.score=S.curTask.saved.score||0;S.curTask.answers=S.curTask.saved.answers||[]}
  renderStep();
}

function renderStep(){
  const{data,step,maxSteps,meta}=S.curTask;
  if(step>=maxSteps){const finalScore=Math.min(100,Math.floor(S.curTask.score/maxSteps));finishTask(finalScore);return}
  const s=data.steps[step];
  let h=`<h3>${meta.title}</h3>`;
  // Индикатор шагов
  h+='<div class="step-indicator">';
  for(let i=0;i<maxSteps;i++)h+=`<div class="step-dot ${i<step?'done':i===step?'active':''}"></div>`;
  h+='</div>';
  // Обучающая панель
  if(s.learn)h+=`<div class="info-panel">${s.learn}</div>`;
  // Описание
  if(s.text)h+=`<div style="font-size:6px;color:var(--txt);line-height:1.7;margin:6px 0">${s.text}</div>`;
  // Контент по типу
  h+=`<div class="tg-content" id="step-content">`;
  if(s.type==='choice')h+=renderChoice(s);
  else if(s.type==='multi_choice')h+=renderMultiChoice(s);
  else if(s.type==='order')h+=renderOrder(s);
  else if(s.type==='builder')h+=renderBuilder(s);
  else if(s.type==='grid')h+=renderGrid(s);
  else if(s.type==='input')h+=renderInput(s);
  else if(s.type==='scenario')h+=renderScenario(s);
  else if(s.type==='match')h+=renderMatch(s);
  h+=`</div>`;
  document.getElementById('tg-area').innerHTML=h;
  // Пост-рендер инициализация
  if(s.type==='order')initDrag();
  if(s.type==='grid')initGrid(s);
}

// --- Выбор одного ---
function renderChoice(s){
  let h='<div class="choice-list">';
  s.options.forEach((o,i)=>h+=`<button class="choice-btn" onclick="ansChoice(${i},${s.correct})">${o}</button>`);
  return h+'</div>';
}
function ansChoice(sel,cor){
  document.querySelectorAll('.choice-btn').forEach((b,i)=>{
    b.onclick=null;if(i===cor)b.classList.add('correct');
    if(i===sel&&sel!==cor)b.classList.add('wrong');
  });
  S.curTask.score+=sel===cor?100:15;S.curTask.answers.push(sel);
  setTimeout(nextStep,900);
}

// --- Множественный выбор ---
function renderMultiChoice(s){
  let h=`<div style="font-size:5px;color:var(--txt2);margin-bottom:4px">Выбери ${s.need} вариантов</div><div class="choice-list">`;
  s.options.forEach((o,i)=>h+=`<button class="choice-btn" data-i="${i}" onclick="toggleMC(this,${i})">${o}</button>`);
  h+=`</div><div style="margin-top:8px"><button class="btn sec" onclick="checkMC()">✓ ПОДТВЕРДИТЬ</button></div>`;
  window._mcSel=[];window._mcCorrect=s.correct;
  return h;
}
function toggleMC(el,i){
  if(el.classList.contains('selected')){el.classList.remove('selected');window._mcSel=window._mcSel.filter(x=>x!==i)}
  else{el.classList.add('selected');window._mcSel.push(i)}
}
function checkMC(){
  const cor=window._mcCorrect;let hits=0;
  window._mcSel.forEach(i=>{if(cor.includes(i))hits++});
  document.querySelectorAll('.choice-btn').forEach((b,i)=>{
    b.onclick=null;if(cor.includes(i))b.classList.add('correct');
    else if(window._mcSel.includes(i))b.classList.add('wrong');
  });
  S.curTask.score+=Math.floor(hits/cor.length*100);
  setTimeout(nextStep,900);
}

// --- Порядок (drag) ---
function renderOrder(s){
  const items=[...s.items].sort(()=>Math.random()-.5);
  let h=`<div class="drag-list" id="drag-list">`;
  items.forEach(it=>h+=`<div class="drag-item"><span class="dh">☰</span><span>${it}</span></div>`);
  h+=`</div><div style="margin-top:8px"><button class="btn sec" onclick="checkOrder()">✓ ПОДТВЕРДИТЬ</button></div>`;
  window._orderCorrect=s.items;
  return h;
}
function initDrag(){
  let dragEl=null,startY=0;
  document.addEventListener('touchstart',function handler(e){
    const item=e.target.closest('.drag-item');if(!item)return;
    dragEl=item;startY=e.touches[0].clientY;item.classList.add('dragging');
  },{passive:true});
  document.addEventListener('touchmove',function(e){
    if(!dragEl)return;const cy=e.touches[0].clientY,diff=cy-startY;
    const cont=dragEl.parentElement;if(!cont)return;
    const items=Array.from(cont.querySelectorAll('.drag-item')),idx=items.indexOf(dragEl);
    if(diff>35&&idx<items.length-1){cont.insertBefore(items[idx+1],dragEl);startY=cy}
    else if(diff<-35&&idx>0){cont.insertBefore(dragEl,items[idx-1]);startY=cy}
  },{passive:true});
  document.addEventListener('touchend',function(){if(dragEl){dragEl.classList.remove('dragging');dragEl=null}});
}
function checkOrder(){
  const items=Array.from(document.querySelectorAll('#drag-list .drag-item'));
  const cur=items.map(el=>el.querySelector('span:last-child').textContent);
  let score=0;cur.forEach((v,i)=>{if(v===window._orderCorrect[i])score+=Math.floor(100/window._orderCorrect.length)});
  S.curTask.score+=Math.min(100,score);nextStep();
}

// --- Конструктор (site builder и подобные) ---
function renderBuilder(s){
  let h=`<div class="sb-workspace" id="sb-ws">`;
  if(s.initial)s.initial.forEach(b=>h+=`<div class="sb-block"><div class="sb-label">${b.label}</div>${b.content}</div>`);
  h+=`<div style="text-align:center;font-size:5px;color:var(--txt2);padding:10px">Перетащи блоки сюда ↑</div></div>`;
  h+=`<div style="font-size:6px;color:var(--sec);margin:6px 0">Доступные блоки:</div>`;
  h+=`<div class="sb-palette" id="sb-pal">`;
  s.pieces.forEach((p,i)=>h+=`<div class="sb-piece" data-i="${i}" onclick="addBlock(${i})">${p.icon} ${p.name}</div>`);
  h+=`</div><div style="margin-top:8px"><button class="btn grn" onclick="checkBuilder()">✓ ГОТОВО</button></div>`;
  window._bPieces=s.pieces;window._bCorrect=s.correct;window._bAdded=[];
  return h;
}
function addBlock(i){
  const p=window._bPieces[i];const el=document.querySelector(`.sb-piece[data-i="${i}"]`);
  if(el.classList.contains('used'))return;el.classList.add('used');window._bAdded.push(p.id);
  const ws=document.getElementById('sb-ws');
  const hint=ws.querySelector('div:last-child');
  const block=document.createElement('div');block.className='sb-block';
  block.innerHTML=`<div class="sb-label">${p.icon} ${p.name}</div>${p.preview||''}`;
  ws.insertBefore(block,hint);
}
function checkBuilder(){
  const cor=window._bCorrect;const added=window._bAdded;
  let score=0;cor.forEach((c,i)=>{if(added[i]===c)score+=Math.floor(100/cor.length)});
  S.curTask.score+=Math.min(100,score);nextStep();
}

// --- Сетка (level editor и подобные) ---
function renderGrid(s){
  const sz=s.size||8;
  let h=`<div class="grid-canvas" id="game-grid" style="grid-template-columns:repeat(${sz},1fr)">`;
  for(let i=0;i<sz*sz;i++)h+=`<div class="grid-cell" data-i="${i}"></div>`;
  h+=`</div>`;
  h+=`<div class="sb-palette">`;
  s.tools.forEach((t,i)=>h+=`<div class="sb-piece ${i===0?'selected':''}" data-t="${i}" onclick="selGridTool(${i})">${t.icon} ${t.name}</div>`);
  h+=`</div><div style="margin-top:8px"><button class="btn grn" onclick="checkGrid()">✓ ПРОВЕРИТЬ</button></div>`;
  window._gridTools=s.tools;window._gridTool=0;window._gridData=new Array(sz*sz).fill(-1);window._gridCheck=s.check;
  return h;
}
function initGrid(s){
  document.querySelectorAll('.grid-cell').forEach(cell=>{
    cell.addEventListener('pointerdown',()=>{
      const i=+cell.dataset.i;const t=window._gridTool;
      window._gridData[i]=t;cell.textContent=window._gridTools[t].icon;
      cell.style.background=window._gridTools[t].color||'var(--bg3)';cell.classList.add('filled');
    });
  });
}
function selGridTool(i){
  document.querySelectorAll('.sb-piece').forEach(p=>p.classList.toggle('selected',+p.dataset.t===i));
  window._gridTool=i;
}
function checkGrid(){
  const fn=window._gridCheck;const data=window._gridData;
  let score=typeof fn==='function'?fn(data):50;
  S.curTask.score+=Math.min(100,score);nextStep();
}

// --- Ввод значения ---
function renderInput(s){
  let h=`<div style="margin:8px 0"><input class="game-input" id="game-inp" type="${s.inputType||'text'}" placeholder="${s.placeholder||'Введи ответ...'}"></div>`;
  h+=`<button class="btn sec" onclick="checkInput()">✓ ОТВЕТИТЬ</button>`;
  window._inputCorrect=s.correct;window._inputFuzzy=s.fuzzy||false;
  return h;
}
function checkInput(){
  const val=document.getElementById('game-inp').value.trim().toLowerCase();
  const cor=window._inputCorrect;
  let match=false;
  if(Array.isArray(cor))match=cor.some(c=>val.includes(c.toLowerCase()));
  else match=val===cor.toLowerCase()||(window._inputFuzzy&&val.includes(cor.toLowerCase()));
  S.curTask.score+=match?100:10;nextStep();
}

// --- Сценарий с последствиями ---
function renderScenario(s){
  let h=`<div style="font-size:6px;line-height:1.7;margin:4px 0;color:var(--txt)">${s.situation}</div>`;
  h+='<div class="choice-list">';
  s.actions.forEach((a,i)=>h+=`<button class="choice-btn" onclick="doScenario(${i})">${a.text}</button>`);
  h+='</div>';
  window._scenarioActions=s.actions;
  return h;
}
function doScenario(i){
  const a=window._scenarioActions[i];
  S.curTask.score+=a.score||0;
  document.querySelectorAll('.choice-btn').forEach(b=>b.onclick=null);
  document.querySelectorAll('.choice-btn')[i].classList.add(a.score>=60?'correct':'wrong');
  if(a.feedback){
    const el=document.createElement('div');el.className='info-panel';el.style.marginTop='8px';
    el.innerHTML=a.feedback;document.getElementById('step-content').appendChild(el);
  }
  setTimeout(nextStep,1200);
}

// --- Сопоставление ---
function renderMatch(s){
  let h='<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">';
  h+='<div style="font-size:5px;color:var(--sec);text-align:center">Элемент</div><div style="font-size:5px;color:var(--sec);text-align:center">Ответ</div>';
  const shuffledRight=[...s.right].sort(()=>Math.random()-.5);
  s.left.forEach((l,i)=>{
    h+=`<div style="font-size:6px;padding:6px;background:var(--bg3);border-radius:2px">${l}</div>`;
    h+=`<select class="game-input" data-mi="${i}" style="font-size:6px;padding:4px"><option value="">выбери...</option>`;
    shuffledRight.forEach(r=>h+=`<option value="${r}">${r}</option>`);
    h+=`</select>`;
  });
  h+='</div>';
  h+=`<div style="margin-top:8px"><button class="btn sec" onclick="checkMatch()">✓ ПОДТВЕРДИТЬ</button></div>`;
  window._matchCorrect=s.correct;
  return h;
}
function checkMatch(){
  const cor=window._matchCorrect;let hits=0;
  document.querySelectorAll('[data-mi]').forEach((sel,i)=>{if(sel.value===cor[i])hits++});
  S.curTask.score+=Math.floor(hits/cor.length*100);nextStep();
}

function nextStep(){S.curTask.step++;renderStep()}
