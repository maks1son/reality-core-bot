<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RE:ALITY — Профессии</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#111119;--bg2:#1a1a26;--bg3:#222233;
  --accent:#7c6ff7;--teal:#4fd1c5;--green:#56d89a;
  --red:#f76c6c;--yellow:#f7d76c;--orange:#f7a06c;
  --text:#d4d4e0;--text2:#6b6b80;--white:#eeeef5;
}
body{
  font-family:'Press Start 2P',monospace;
  background:var(--bg);color:var(--text);
  max-width:420px;margin:0 auto;min-height:100vh;
  overflow-x:hidden;-webkit-tap-highlight-color:transparent;user-select:none;
}
input{font-family:'Press Start 2P',monospace}
.btn{
  font-family:'Press Start 2P',monospace;background:var(--bg3);
  color:var(--accent);border:2px solid var(--accent);
  padding:10px 16px;font-size:9px;cursor:pointer;width:100%;text-align:center;
  transition:all .15s;border-radius:4px;
}
.btn:active{transform:scale(.97);opacity:.8}
.btn:disabled{opacity:.3;cursor:default}
.btn.green{border-color:var(--green);color:var(--green)}
.btn.sm{padding:7px 12px;font-size:7px}
.pbar{width:100%;height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.pbar .fill{height:100%;border-radius:4px;transition:width .3s}
.pbar.thick{height:14px;border-radius:6px}
.screen{display:none;flex-direction:column;min-height:100vh;padding-bottom:60px}
.screen.active{display:flex}
.card{background:var(--bg2);border:1px solid #2a2a3a;border-radius:8px;padding:12px;margin:6px 8px}
#navbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;display:flex;background:var(--bg2);border-top:1px solid #2a2a3a;z-index:100}
#navbar .nb{flex:1;padding:8px 4px;text-align:center;font-family:'Press Start 2P',monospace;font-size:6px;color:var(--text2);background:none;border:none;cursor:pointer}
#navbar .nb.on{color:var(--accent)}
#navbar .nb span{display:block;font-size:16px;margin-bottom:2px}
#reg-screen{justify-content:center;align-items:center;padding:16px}
#reg-screen h1{font-size:14px;color:var(--accent);text-align:center;margin-bottom:4px}
#reg-screen .sub{font-size:7px;color:var(--teal);text-align:center;margin-bottom:16px}
.av-sel{display:flex;gap:10px;justify-content:center;margin:12px 0}
.av-opt{width:72px;height:72px;border:2px solid var(--text2);cursor:pointer;image-rendering:pixelated;background:var(--bg3);padding:4px;border-radius:8px;transition:all .2s}
.av-opt.sel{border-color:var(--accent);box-shadow:0 0 16px rgba(124,111,247,.3);transform:scale(1.08)}
.av-opt img{width:100%;height:100%;image-rendering:pixelated;object-fit:contain}
.nm-inp{width:100%;background:var(--bg);border:2px solid #2a2a3a;color:var(--text);padding:10px;font-size:11px;text-align:center;outline:none;border-radius:6px}
.nm-inp:focus{border-color:var(--accent)}
.st-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.st-item{background:var(--bg3);border:1px solid #2a2a3a;padding:8px;text-align:center;border-radius:6px}
.st-item .sn{font-size:6px;color:var(--teal);margin-bottom:6px;display:block}
.st-item .sc{display:flex;align-items:center;justify-content:center;gap:8px}
.st-item .sv{font-size:13px;color:var(--accent);min-width:24px}
.st-item button{font-family:'Press Start 2P',monospace;width:26px;height:26px;background:var(--bg);color:var(--accent);border:1px solid var(--accent);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;border-radius:4px}
.st-item button:disabled{opacity:.3}
.pts{font-size:8px;color:var(--yellow);text-align:center;margin:6px 0}
#main-screen{padding:0}
.top-bar{display:flex;align-items:center;padding:10px 12px;gap:8px}
.top-bar .av{width:36px;height:36px;image-rendering:pixelated;border:2px solid var(--accent);border-radius:6px}
.top-bar .info{flex:1}
.top-bar .nm{font-size:9px;color:var(--white)}
.top-bar .lv{font-size:6px;color:var(--teal);margin-top:2px}
.top-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.top-right .res{font-size:7px;color:var(--text2);display:flex;align-items:center;gap:3px}
.top-right .res b{color:var(--yellow)}
.xp-row{padding:2px 12px 6px}
.xp-row .xl{font-size:6px;color:var(--text2);margin-bottom:2px;display:flex;justify-content:space-between}
.tap-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;position:relative;min-height:340px}
.tap-char{width:160px;height:160px;image-rendering:pixelated;cursor:pointer;animation:breathe 2.5s ease-in-out infinite;transition:transform .08s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.tap-char:active{transform:scale(.9)}
@keyframes breathe{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.03)}}
.combo-txt{font-size:9px;color:var(--yellow);text-align:center;margin-top:8px;min-height:14px}
.coin-pop{position:absolute;font-size:11px;color:var(--yellow);pointer-events:none;animation:cfloat .7s ease-out forwards;z-index:50}
@keyframes cfloat{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-50px) scale(1.2)}}
#prof-screen{padding:8px}
#prof-screen h2{font-size:11px;color:var(--accent);text-align:center;margin:8px}
.sph-list{display:flex;flex-direction:column;gap:6px;padding:4px}
.sph-card{background:var(--bg2);border:1px solid #2a2a3a;padding:12px;border-radius:8px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px}
.sph-card:active{border-color:var(--accent);transform:scale(.98)}
.sph-card .si{font-size:24px}
.sph-card .sn{font-size:8px;color:var(--text)}
.sph-card .sc2{font-size:6px;color:var(--text2);margin-top:3px}
.pr-list{display:flex;flex-direction:column;gap:6px;padding:4px}
.pr-card{background:var(--bg3);border:1px solid #2a2a3a;padding:10px;border-radius:6px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:all .2s}
.pr-card.unlk{border-color:var(--green)}
.pd-hdr{text-align:center;margin:8px 0}
.pd-hdr .pdi{font-size:36px}
.pd-hdr .pdn{font-size:10px;color:var(--accent);margin:6px 0}
.pd-hdr .pdd{font-size:6px;color:var(--text2);line-height:1.6}
.pd-tools{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:10px 0}
.pd-tools .tt{background:var(--bg);border:1px solid var(--teal);color:var(--teal);font-size:6px;padding:3px 8px;border-radius:4px}
.tk-list{display:flex;flex-direction:column;gap:6px}
.tk-card{background:var(--bg3);border:1px solid #2a2a3a;padding:10px;border-radius:6px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:all .2s}
.tk-card.done{border-color:var(--green);opacity:.6}
.tk-card.lock{opacity:.3;cursor:default}
.tk-card .tn{width:26px;height:26px;border:2px solid var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--accent);flex-shrink:0}
.tk-card.done .tn{border-color:var(--green);color:var(--green)}
.back-b{background:none;border:none;color:var(--teal);font-family:'Press Start 2P',monospace;font-size:7px;cursor:pointer;padding:8px}
#upg-screen{padding:8px}
#upg-screen h2{font-size:11px;color:var(--accent);text-align:center;margin:8px}
.upg-list{display:flex;flex-direction:column;gap:8px;padding:4px}
.upg-card{background:var(--bg2);border:1px solid #2a2a3a;padding:12px;border-radius:8px;display:flex;flex-direction:column;gap:8px}
#task-screen{padding:6px}
.tg-header{text-align:center;margin:6px 0}
.tg-header h3{font-size:9px;color:var(--accent);margin-bottom:4px}
.tg-header p{font-size:6px;color:var(--text2);line-height:1.5}
.target-preview{display:grid;gap:1px;padding:4px;background:var(--bg3);border-radius:4px;margin:6px auto;width:fit-content}
.target-cell{width:12px;height:12px;border-radius:1px}
.tool-palette{display:flex;gap:6px;padding:8px;flex-wrap:wrap;justify-content:center}
.tool-item{width:36px;height:36px;border:2px solid var(--text2);border-radius:6px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;font-size:14px}
.tool-item.sel{border-color:var(--accent);box-shadow:0 0 8px rgba(124,111,247,.4);transform:scale(1.1)}
.paint-canvas{display:grid;gap:1px;padding:4px;background:var(--bg);border-radius:8px;border:1px solid #2a2a3a}
.paint-cell{aspect-ratio:1;background:var(--bg3);cursor:pointer;border-radius:1px;transition:background .1s}
.catch-area{width:100%;height:320px;background:var(--bg);border:1px solid #2a2a3a;border-radius:8px;position:relative;overflow:hidden}
.catch-item{position:absolute;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:20px;border-radius:8px;cursor:pointer;transition:transform .1s;animation:fallDown linear forwards}
.catch-item:active{transform:scale(.7)}
@keyframes fallDown{0%{top:-50px}100%{top:340px}}
.catch-hud{display:flex;justify-content:space-between;padding:6px 8px;font-size:7px;align-items:center}
.catch-hud .hp-bar{width:120px;height:10px;background:var(--bg);border-radius:5px;overflow:hidden;border:1px solid #2a2a3a}
.catch-hud .hp-fill{height:100%;background:var(--green);border-radius:5px;transition:width .3s}
.grid-board{display:grid;gap:2px;padding:4px;background:var(--bg);border-radius:6px}
.grid-cell{aspect-ratio:1;background:var(--bg2);border:1px solid #2a2a3a;border-radius:2px;cursor:pointer;transition:all .15s}
.grid-cell.filled{border-color:transparent}
.scan-grid{display:grid;gap:3px;padding:6px;background:var(--bg);border-radius:8px;border:1px solid #2a2a3a}
.scan-cell{aspect-ratio:1;background:var(--bg2);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer;transition:all .2s;border:1px solid transparent}
.scan-cell.found{border-color:var(--green);background:rgba(86,216,154,.15)}
.scan-cell.wrong{border-color:var(--red);background:rgba(247,108,108,.15)}
.lab-area{width:100%;height:280px;background:var(--bg);border:1px solid #2a2a3a;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.beaker{width:100px;height:140px;border:3px solid var(--teal);border-top:none;border-radius:0 0 16px 16px;position:relative;overflow:hidden;margin-bottom:12px}
.beaker-liquid{position:absolute;bottom:0;width:100%;transition:all .5s;border-radius:0 0 12px 12px}
.ingredients{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;padding:8px}
.ingr-item{width:48px;height:48px;background:var(--bg2);border:2px solid var(--text2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all .2s}
.ingr-item:active{transform:scale(.85)}
.ingr-item.used{opacity:.3;cursor:default}
.game-timer{font-size:8px;color:var(--yellow);text-align:center;margin:4px 0;min-height:14px}
.task-res{text-align:center;padding:20px}
.task-res .ri{font-size:36px;margin-bottom:10px}
.task-res .rt{font-size:11px;color:var(--accent);margin-bottom:6px}
.task-res .rs{font-size:8px;color:var(--teal);margin-bottom:6px}
.task-res .rr{font-size:7px;color:var(--green);margin-bottom:14px}
.modal-ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:200;justify-content:center;align-items:center;padding:16px}
.modal-ov.on{display:flex}
.modal-bx{background:var(--bg2);border:1px solid var(--accent);padding:20px;max-width:320px;width:100%;text-align:center;border-radius:10px}
.modal-bx h3{font-size:10px;color:var(--accent);margin-bottom:10px}
.modal-bx p{font-size:7px;color:var(--text2);line-height:1.6;margin-bottom:14px}
#loading{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:999}
#loading h1{font-size:14px;color:var(--accent);margin-bottom:8px}
#loading p{font-size:7px;color:var(--teal);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div id="loading"><h1>RE:ALITY</h1><p>Загрузка...</p></div>
<div class="modal-ov" id="modal"><div class="modal-bx" id="modal-c"></div></div>

<div class="screen" id="reg-screen">
<h1>RE:ALITY</h1><div class="sub">ПРОФЕССИИ</div>
<div class="card"><div style="font-size:7px;color:var(--teal);text-align:center;margin-bottom:10px">АВАТАР</div>
<div class="av-sel"><div class="av-opt sel" data-av="1" onclick="selAv(1)"><img src="/hero1.png"></div><div class="av-opt" data-av="2" onclick="selAv(2)"><img src="/hero2.png"></div><div class="av-opt" data-av="3" onclick="selAv(3)"><img src="/hero3.png"></div></div></div>
<div class="card"><div style="font-size:7px;color:var(--teal);text-align:center;margin-bottom:10px">ИМЯ</div>
<input type="text" class="nm-inp" id="nm-inp" maxlength="8" placeholder="Макс 8 букв"></div>
<div class="card"><div style="font-size:7px;color:var(--teal);text-align:center;margin-bottom:6px">ХАРАКТЕРИСТИКИ</div>
<div class="pts">Очков: <span id="pts-l">0</span></div>
<div class="st-grid">
<div class="st-item"><span class="sn">💪 СИЛА</span><div class="sc"><button onclick="chSt('str',-1)">-</button><span class="sv" id="s-str">5</span><button onclick="chSt('str',1)">+</button></div></div>
<div class="st-item"><span class="sn">🧠 ИНТЕЛЛЕКТ</span><div class="sc"><button onclick="chSt('int',-1)">-</button><span class="sv" id="s-int">5</span><button onclick="chSt('int',1)">+</button></div></div>
<div class="st-item"><span class="sn">🗣 ХАРИЗМА</span><div class="sc"><button onclick="chSt('cha',-1)">-</button><span class="sv" id="s-cha">5</span><button onclick="chSt('cha',1)">+</button></div></div>
<div class="st-item"><span class="sn">🍀 УДАЧА</span><div class="sc"><button onclick="chSt('luck',-1)">-</button><span class="sv" id="s-luck">5</span><button onclick="chSt('luck',1)">+</button></div></div>
</div></div>
<div style="padding:8px"><button class="btn green" onclick="doReg()">НАЧАТЬ ПУТЬ</button></div>
</div>

<div class="screen" id="main-screen">
<div class="top-bar"><img class="av" id="m-av" src="/hero1.png"><div class="info"><div class="nm" id="m-nm">...</div><div class="lv" id="m-lv">УР. 1</div></div>
<div class="top-right"><div class="res">🪙 <b id="r-coins">0</b></div><div class="res">🎫 <b id="r-tokens">0</b></div></div></div>
<div class="xp-row"><div class="xl"><span>XP</span><span id="m-xp-t">0/100</span></div><div class="pbar thick"><div class="fill" id="m-xp-b" style="width:0%;background:var(--accent)"></div></div></div>
<div style="padding:4px 12px;display:flex;align-items:center;gap:6px;justify-content:flex-end"><span style="font-size:6px;color:var(--text2)">⚡</span><div style="width:45%"><div class="pbar thick"><div class="fill" id="e-bar" style="width:100%;background:var(--green)"></div></div></div><span style="font-size:6px;color:var(--text2)" id="e-txt">100/100</span></div>
<div class="tap-zone" id="tap-zone"><img class="tap-char" id="tap-ch" src="/hero1.png" draggable="false"><div class="combo-txt" id="combo-d"></div></div>
</div>

<div class="screen" id="prof-screen"><h2>ПРОФЕССИИ</h2><div id="prof-c"></div></div>
<div class="screen" id="upg-screen"><h2>УЛУЧШЕНИЯ</h2><div style="text-align:center;font-size:8px;color:var(--yellow);margin-bottom:8px">🪙 <span id="u-coins">0</span></div><div class="upg-list" id="upg-list"></div></div>
<div class="screen" id="task-screen"><button class="back-b" onclick="closeTask()">← НАЗАД</button><div id="tg-content"></div></div>
<div id="navbar" style="display:none"><button class="nb" onclick="goTo('prof')"><span>🏢</span>Профессии</button><button class="nb on" onclick="goTo('main')"><span>👆</span>Главная</button><button class="nb" onclick="goTo('upg')"><span>⬆️</span>Улучшения</button></div>

<script>
const S={user:null,unlocked:[],completed:[],xpN:100,profs:[],tgId:0,initData:'',selAv:1,stats:{str:5,int:5,cha:5,luck:5},curSphere:null,curProf:null,curTask:null,eTimer:null};
const tg=window.Telegram?.WebApp;if(tg){tg.ready();tg.expand();S.initData=tg.initData||'';if(tg.initDataUnsafe?.user)S.tgId=tg.initDataUnsafe.user.id}
if(!S.tgId)S.tgId=Math.floor(Math.random()*999999)+100000;

async function api(ep,body={}){body.tg_id=S.tgId;body.init_data=S.initData;const r=await fetch(ep,{method:ep.includes('professions')?'GET':'POST',headers:{'Content-Type':'application/json'},body:ep.includes('professions')?undefined:JSON.stringify(body)});if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.detail||'HTTP '+r.status)}return r.json()}

async function init(){try{const p=await api('/api/professions');S.profs=p.spheres;const d=await api('/api/auth');S.user=d.user;S.unlocked=d.unlocked_professions||[];S.completed=d.completed_tasks||[];S.xpN=d.xp_needed;document.getElementById('loading').style.display='none';if(!S.user.registered){goTo('reg')}else{goTo('main');document.getElementById('navbar').style.display='flex';startERegen()}}catch(e){document.getElementById('loading').innerHTML='<h1>RE:ALITY</h1><p style="color:var(--red)">'+e.message+'</p><br><button class="btn" onclick="location.reload()" style="width:auto;padding:10px 20px">Reload</button>'}}

function goTo(n){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));const map={reg:'reg-screen',main:'main-screen',prof:'prof-screen',upg:'upg-screen',task:'task-screen'};const el=document.getElementById(map[n]);if(el)el.classList.add('active');const nb=document.querySelectorAll('.nb');if(n==='prof')nb[0]&&nb[0].classList.add('on');else if(n==='main')nb[1]&&nb[1].classList.add('on');else if(n==='upg')nb[2]&&nb[2].classList.add('on');if(n==='main')updMain();if(n==='prof')renSpheres();if(n==='upg')renUpg()}

function selAv(n){S.selAv=n;document.querySelectorAll('.av-opt').forEach(function(e){e.classList.toggle('sel',+e.dataset.av===n)})}
function chSt(s,d){var t=S.stats.str+S.stats.int+S.stats.cha+S.stats.luck;var nv=S.stats[s]+d;if(nv<1||nv>14)return;if(d>0&&t>=20)return;S.stats[s]=nv;document.getElementById('s-'+s).textContent=nv;document.getElementById('pts-l').textContent=20-(S.stats.str+S.stats.int+S.stats.cha+S.stats.luck)}
async function doReg(){var nm=document.getElementById('nm-inp').value.trim();if(!nm){modal('Ошибка','Введи имя!');return}var t=S.stats.str+S.stats.int+S.stats.cha+S.stats.luck;if(t!==20){modal('Ошибка','Распредели все 20 очков ('+t+')');return}try{var d=await api('/api/register',{name:nm.slice(0,8),avatar:S.selAv,stats:S.stats});S.user=d.user;S.xpN=d.xp_needed;goTo('main');document.getElementById('navbar').style.display='flex';startERegen();modal('Добро пожаловать!',nm+', тапай по персонажу!')}catch(e){modal('Ошибка',e.message)}}

function updMain(){var u=S.user;if(!u)return;document.getElementById('m-av').src='/hero'+u.avatar+'.png';document.getElementById('tap-ch').src='/hero'+u.avatar+'.png';document.getElementById('m-nm').textContent=u.name;document.getElementById('m-lv').textContent='УР. '+u.level;document.getElementById('m-xp-t').textContent=u.xp+'/'+S.xpN;document.getElementById('m-xp-b').style.width=Math.min(100,(u.xp/S.xpN)*100)+'%';document.getElementById('r-coins').textContent=fmtN(u.coins);document.getElementById('r-tokens').textContent=u.tokens;document.getElementById('e-txt').textContent=u.energy+'/'+u.max_energy;document.getElementById('e-bar').style.width=(u.energy/u.max_energy)*100+'%'}
function fmtN(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return ''+n}

var tapQ=0,tapT=null;
document.getElementById('tap-zone').addEventListener('pointerdown',function(e){e.preventDefault();if(!S.user||!S.user.registered||S.user.energy<=0)return;S.user.energy=Math.max(0,S.user.energy-1);var earn=S.user.coins_per_tap;S.user.coins+=earn;updMain();var r=this.getBoundingClientRect();var p=document.createElement('div');p.className='coin-pop';p.textContent='+'+earn;p.style.left=(e.clientX-r.left-10)+'px';p.style.top=(e.clientY-r.top-10)+'px';this.appendChild(p);setTimeout(function(){p.remove()},700);tapQ++;if(tapT)clearTimeout(tapT);tapT=setTimeout(sendTaps,300)});
async function sendTaps(){if(tapQ<=0)return;var t=tapQ;tapQ=0;try{var d=await api('/api/tap',{taps:t});S.user=d.user;S.xpN=d.xp_needed;updMain();var cd=document.getElementById('combo-d');if(d.combo>1){cd.textContent='COMBO x'+d.combo;cd.style.color=d.combo>=4?'var(--red)':'var(--yellow)'}else cd.textContent='';if(d.level_up){modal('УРОВЕНЬ!','Ты на '+S.user.level+' уровне! +1 токен');if(S.user.level===2)setTimeout(function(){modal('Токены','Открывай профессии!')},2e3)}}catch(e){}}
function startERegen(){if(S.eTimer)clearInterval(S.eTimer);S.eTimer=setInterval(function(){if(!S.user)return;if(S.user.energy<S.user.max_energy){S.user.energy=Math.min(S.user.max_energy,S.user.energy+1);updMain()}},500)}
function renSpheres(){S.curSphere=null;S.curProf=null;var h='<div class="sph-list">';for(var i=0;i<S.profs.length;i++){var s=S.profs[i];h+='<div class="sph-card" onclick="openSph(\''+s.id+'\')"><div class="si">'+s.icon+'</div><div><div class="sn">'+s.name+'</div><div class="sc2">'+s.professions.length+' профессий</div></div></div>'}h+='</div>';document.getElementById('prof-c').innerHTML=h}
function openSph(id){var sp=S.profs.find(function(s){return s.id===id});if(!sp)return;S.curSphere=sp;var h='<button class="back-b" onclick="renSpheres()">← НАЗАД</button><div style="text-align:center;margin:8px;font-size:9px;color:var(--accent)">'+sp.icon+' '+sp.name+'</div><div class="pr-list">';for(var i=0;i<sp.professions.length;i++){var p=sp.professions[i];var ul=S.unlocked.indexOf(p.id)>=0;var cc=S.completed.filter(function(c){return c.profession_id===p.id}).length;h+='<div class="pr-card'+(ul?' unlk':'')+'" onclick="openProf(\''+p.id+'\')"><div style="font-size:20px">'+p.icon+'</div><div><div style="font-size:7px;color:var(--text)">'+p.name+'</div><div style="font-size:6px;margin-top:3px;color:'+(ul?'var(--green)':'var(--yellow)')+'">'+(ul?'✓ '+cc+'/5':'🔒 '+p.cost+' токен')+'</div></div></div>'}h+='</div>';document.getElementById('prof-c').innerHTML=h}
function openProf(id){var pr=null;for(var i=0;i<S.profs.length;i++){pr=S.profs[i].professions.find(function(p){return p.id===id});if(pr)break}if(!pr)return;S.curProf=pr;var ul=S.unlocked.indexOf(id)>=0;var mc=S.completed.filter(function(c){return c.profession_id===id});var h='<button class="back-b" onclick="openSph(\''+S.curSphere.id+'\')">← НАЗАД</button><div class="pd-hdr"><div class="pdi">'+pr.icon+'</div><div class="pdn">'+pr.name+'</div><div class="pdd">'+pr.desc+'</div></div><div class="pd-tools">'+pr.tools.map(function(t){return '<span class="tt">'+t+'</span>'}).join('')+'</div>';if(!ul){h+='<div style="text-align:center;padding:16px"><div style="font-size:7px;color:var(--text2);margin-bottom:12px">Открой для доступа к заданиям</div><button class="btn" onclick="unlkProf(\''+id+'\')">🎫 ОТКРЫТЬ ЗА '+pr.cost+' ТОКЕН</button><div style="font-size:6px;color:var(--text2);margin-top:8px">Токенов: '+S.user.tokens+'</div></div>'}else{h+='<div style="font-size:8px;color:var(--teal);text-align:center;margin:10px">ЗАДАНИЯ</div><div class="tk-list">';for(var i=0;i<pr.tasks.length;i++){var tk=pr.tasks[i];var dn=mc.find(function(c){return c.task_index===i});var prev=i===0||mc.find(function(c){return c.task_index===i-1});var lk=!prev&&!dn;h+='<div class="tk-card'+(dn?' done':'')+(lk?' lock':'')+'" onclick="'+(lk?'':(dn?'':'startTask(\''+id+'\','+i+')'))+'">'+'<div class="tn">'+(dn?'✓':i+1)+'</div><div><div style="font-size:7px;color:var(--text)">'+tk.title+'</div><div style="font-size:6px;color:var(--text2);margin-top:2px">'+(lk?'🔒':tk.desc)+'</div></div></div>'}h+='</div>'}document.getElementById('prof-c').innerHTML=h}
async function unlkProf(id){try{var d=await api('/api/unlock',{profession_id:id});S.user=d.user;S.unlocked=d.unlocked_professions;S.xpN=d.xp_needed;openProf(id);modal('Открыто!','Выполняй задания!')}catch(e){modal('Ошибка',e.message)}}

async function buyUpg(t){try{var d=await api('/api/upgrade',{upgrade_type:t});S.user=d.user;S.xpN=d.xp_needed;renUpg();updMain()}catch(e){modal('Ошибка',e.message)}}

function startTask(profId,idx){var pr=null;for(var i=0;i<S.profs.length;i++){pr=S.profs[i].professions.find(function(p){return p.id===profId});if(pr)break}if(!pr)return;var gd=GAMES[profId]?GAMES[profId][idx]:null;if(!gd){modal('Скоро','В разработке!');return}S.curTask={profId:profId,idx:idx,meta:pr.tasks[idx],gdata:gd};goTo('task');document.getElementById('navbar').style.display='none';renderGame()}
function closeTask(){var pid=S.curTask?S.curTask.profId:null;S.curTask=null;goTo('prof');document.getElementById('navbar').style.display='flex';if(pid&&S.curSphere){setTimeout(function(){openSph(S.curSphere.id);setTimeout(function(){openProf(pid)},50)},50)}}
function renderGame(){var gd=S.curTask.gdata;var c=document.getElementById('tg-content');var h='<div class="tg-header"><h3>'+gd.title+'</h3><p>'+gd.desc+'</p></div><div class="tg-body" id="tg-body">';var g=gd.game,cfg=gd.config;if(g==='paint')h+=initPaint(cfg);else if(g==='catch')h+=initCatch(cfg);else if(g==='gridplace')h+=initGP(cfg);else if(g==='scan')h+=initScan(cfg);else if(g==='labmix')h+=initLab(cfg);h+='</div>';c.innerHTML=h;if(g==='catch')startCatchLoop(cfg);if(g==='scan')startScanTimer(cfg)}

// PAINT
function initPaint(cfg){var sz=cfg.size;var cl=cfg.colors;window._p={grid:[],sel:1,cfg:cfg};for(var r=0;r<sz;r++){window._p.grid[r]=[];for(var c=0;c<sz;c++)window._p.grid[r][c]=0}var h='<div style="text-align:center;margin-bottom:4px;font-size:6px;color:var(--text2)">Образец:</div>';h+='<div class="target-preview" style="grid-template-columns:repeat('+sz+',12px)">';for(var r=0;r<sz;r++)for(var c=0;c<sz;c++)h+='<div class="target-cell" style="background:'+cl[cfg.target[r][c]]+'"></div>';h+='</div><div class="tool-palette">';for(var i=1;i<cl.length;i++)h+='<div class="tool-item'+(i===1?' sel':'')+'" style="background:'+cl[i]+'" onclick="selPC('+i+')"></div>';h+='</div>';var cs=Math.floor(360/sz);h+='<div class="paint-canvas" style="grid-template-columns:repeat('+sz+',1fr);max-width:'+(cs*sz+sz)+'px;margin:0 auto" id="pg">';for(var r=0;r<sz;r++)for(var c=0;c<sz;c++)h+='<div class="paint-cell" data-r="'+r+'" data-c="'+c+'" style="width:'+cs+'px;height:'+cs+'px"></div>';h+='</div><div style="margin-top:10px"><button class="btn green" onclick="chkPaint()">✓ ГОТОВО</button></div>';setTimeout(function(){var painting=false;var pg=document.getElementById('pg');if(!pg)return;function doP(ev){var el=document.elementFromPoint(ev.clientX||(ev.touches&&ev.touches[0]?ev.touches[0].clientX:0),ev.clientY||(ev.touches&&ev.touches[0]?ev.touches[0].clientY:0));if(!el||!el.dataset||el.dataset.r===undefined)return;var r=+el.dataset.r,c=+el.dataset.c;window._p.grid[r][c]=window._p.sel;el.style.background=cfg.colors[window._p.sel]}pg.addEventListener('pointerdown',function(e){e.preventDefault();painting=true;doP(e)});pg.addEventListener('pointermove',function(e){if(painting)doP(e)});document.addEventListener('pointerup',function(){painting=false})},100);return h}
function selPC(i){window._p.sel=i;document.querySelectorAll('.tool-item').forEach(function(el,j){el.classList.toggle('sel',j===i-1)})}
function chkPaint(){var p=window._p;var match=0,total=0;for(var r=0;r<p.cfg.size;r++)for(var c=0;c<p.cfg.size;c++){if(p.cfg.target[r][c]>0){total++;if(p.grid[r][c]===p.cfg.target[r][c])match++}}finishTask(total>0?Math.round(match/total*100):50)}

// CATCH
function initCatch(cfg){window._c={score:0,hp:100,on:true,ts:[],st:Date.now()};return '<div class="catch-hud"><div style="color:var(--text)">Очки: <span id="csc">0</span></div><div class="hp-bar"><div class="hp-fill" id="chp" style="width:100%"></div></div></div><div class="game-timer" id="ctm">'+cfg.duration+'с</div><div class="catch-area" id="ca"></div>'}
function startCatchLoop(cfg){var area=document.getElementById('ca');if(!area)return;var c=window._c;function spawn(){if(!c.on)return;var ig=Math.random()>0.35;var el=document.createElement('div');el.className='catch-item';el.textContent=ig?cfg.good:cfg.bad;el.style.left=Math.random()*85+'%';el.style.animationDuration=(cfg.speed||3)+'s';el.style.background=ig?'rgba(86,216,154,.15)':'rgba(247,108,108,.15)';el.addEventListener('pointerdown',function(ev){ev.preventDefault();ev.stopPropagation();if(!c.on)return;if(ig){c.score+=10;el.style.transform='scale(1.5)';el.style.opacity='0'}else{c.hp-=25;var hpe=document.getElementById('chp');if(hpe)hpe.style.width=Math.max(0,c.hp)+'%';if(c.hp<=0){c.on=false;finishTask(Math.min(100,c.score))}}var sce=document.getElementById('csc');if(sce)sce.textContent=c.score;setTimeout(function(){if(el.parentNode)el.remove()},200)});area.appendChild(el);setTimeout(function(){if(el.parentNode)el.remove()},cfg.speed*1000+500)}var si=setInterval(function(){if(!c.on){clearInterval(si);return}var elapsed=(Date.now()-c.st)/1000;var rem=Math.max(0,Math.ceil(cfg.duration-elapsed));var te=document.getElementById('ctm');if(te)te.textContent=rem+'с';if(elapsed>=cfg.duration){c.on=false;clearInterval(si);finishTask(Math.min(100,c.score))}else{spawn()}},800);c.ts.push(si)}

// GRID PLACE
function initGP(cfg){var cols=cfg.cols,rows=cfg.rows,pcs=cfg.pieces;window._gp={grid:[],pieces:[],sel:null,cols:cols,rows:rows};for(var r=0;r<rows;r++){window._gp.grid[r]=[];for(var c=0;c<cols;c++)window._gp.grid[r][c]=-1}for(var i=0;i<pcs.length;i++)window._gp.pieces.push({emoji:pcs[i].emoji,w:pcs[i].w,h:pcs[i].h,color:pcs[i].color,name:pcs[i].name,placed:false,idx:i});var cs=Math.floor(360/cols);var h='<div style="font-size:6px;color:var(--text2);text-align:center;margin-bottom:6px">Выбери блок → нажми на сетку</div>';h+='<div class="grid-board" id="gpb" style="grid-template-columns:repeat('+cols+','+cs+'px);justify-content:center">';for(var r=0;r<rows;r++)for(var c=0;c<cols;c++)h+='<div class="grid-cell" style="width:'+cs+'px;height:'+cs+'px" data-r="'+r+'" data-c="'+c+'" onclick="plGP('+r+','+c+')"></div>';h+='</div><div id="gpp" style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:8px 0">';for(var i=0;i<pcs.length;i++)h+='<div class="tool-item" style="width:auto;height:auto;padding:6px 8px;font-size:6px;background:'+pcs[i].color+'33;border-color:'+pcs[i].color+'" onclick="selGP('+i+')" id="gpi-'+i+'">'+pcs[i].emoji+' '+pcs[i].name+'</div>';h+='</div><div style="margin-top:8px"><button class="btn green" onclick="chkGP()">✓ ГОТОВО</button></div>';return h}
function selGP(i){window._gp.sel=i;document.querySelectorAll('#gpp .tool-item').forEach(function(el,j){el.classList.toggle('sel',j===i)})}
function plGP(r,c){var gp=window._gp;if(gp.sel===null)return;var p=gp.pieces[gp.sel];if(p.placed)return;if(r+p.h>gp.rows||c+p.w>gp.cols)return;for(var dr=0;dr<p.h;dr++)for(var dc=0;dc<p.w;dc++)if(gp.grid[r+dr][c+dc]!==-1)return;for(var dr=0;dr<p.h;dr++)for(var dc=0;dc<p.w;dc++)gp.grid[r+dr][c+dc]=p.idx;p.placed=true;var bd=document.getElementById('gpb');var cells=bd.querySelectorAll('.grid-cell');for(var dr=0;dr<p.h;dr++)for(var dc=0;dc<p.w;dc++){var cell=cells[(r+dr)*gp.cols+(c+dc)];cell.style.background=p.color;cell.classList.add('filled');if(dr===0&&dc===0)cell.innerHTML='<span style="font-size:10px">'+p.emoji+'</span>'}var gpi=document.getElementById('gpi-'+p.idx);if(gpi)gpi.style.opacity='.3';gp.sel=null;document.querySelectorAll('#gpp .tool-item').forEach(function(el){el.classList.remove('sel')})}
function chkGP(){var gp=window._gp;var placed=gp.pieces.filter(function(p){return p.placed}).length;finishTask(Math.round(placed/gp.pieces.length*100))}

// SCAN
function initScan(cfg){var sz=cfg.size;var bugs=new Set();while(bugs.size<cfg.bugCount)bugs.add(Math.floor(Math.random()*cfg.totalCells));window._sc={bugs:bugs,found:new Set(),wrong:0,tl:cfg.timeLimit,on:true,sz:sz,cfg:cfg};var cs=Math.floor(360/sz);var h='<div class="game-timer" id="stm">'+cfg.timeLimit+'с</div><div style="font-size:6px;color:var(--text2);text-align:center;margin-bottom:6px">Найди '+cfg.bugCount+' аномалий!</div>';h+='<div class="scan-grid" style="grid-template-columns:repeat('+sz+','+cs+'px);justify-content:center">';for(var i=0;i<cfg.totalCells;i++){var ib=bugs.has(i);h+='<div class="scan-cell" style="width:'+cs+'px;height:'+cs+'px;background:'+(ib?cfg.neutralColor:['var(--bg2)','#2a2a3a','#252538'][Math.floor(Math.random()*3)])+'" data-i="'+i+'" onclick="tapSc('+i+','+(ib?'true':'false')+')">';if(ib)h+='<span style="opacity:.12;font-size:'+(cs*.4)+'px">⚠</span>';else h+='<span style="opacity:.06;font-size:'+(cs*.3)+'px">·</span>';h+='</div>'}h+='</div><div style="text-align:center;margin-top:6px;font-size:7px;color:var(--green)">Найдено: <span id="sfn">0</span>/'+cfg.bugCount+'</div>';return h}
function tapSc(i,ib){var sc=window._sc;if(!sc.on)return;var cell=document.querySelector('.scan-cell[data-i="'+i+'"]');if(sc.found.has(i))return;if(ib){sc.found.add(i);cell.classList.add('found');cell.innerHTML='✓';var sfn=document.getElementById('sfn');if(sfn)sfn.textContent=sc.found.size;if(sc.found.size>=sc.cfg.bugCount){sc.on=false;finishTask(Math.max(20,100-sc.wrong*10))}}else{sc.wrong++;cell.classList.add('wrong');cell.innerHTML='✗';setTimeout(function(){cell.classList.remove('wrong');cell.innerHTML=''},500)}}
function startScanTimer(cfg){var si=setInterval(function(){var sc=window._sc;if(!sc||!sc.on){clearInterval(si);return}sc.tl--;var el=document.getElementById('stm');if(el)el.textContent=sc.tl+'с';if(sc.tl<=0){sc.on=false;clearInterval(si);finishTask(Math.max(10,Math.min(100,Math.round(sc.found.size/sc.cfg.bugCount*100)-sc.wrong*5)))}},1000)}

// LAB MIX
function initLab(cfg){window._lb={added:[],correct:cfg.correct,cfg:cfg};var h='<div class="lab-area"><div class="beaker"><div class="beaker-liquid" id="blq" style="height:0%;background:var(--bg3)"></div></div></div>';h+='<div style="font-size:6px;color:var(--text2);text-align:center;margin:6px">Целевой цвет: <span style="display:inline-block;width:20px;height:12px;background:'+cfg.target+';vertical-align:middle;border-radius:2px"></span></div>';h+='<div class="ingredients">';for(var i=0;i<cfg.ingredients.length;i++)h+='<div class="ingr-item" id="ig-'+i+'" onclick="addIg('+i+')" title="'+cfg.ingredients[i].name+'">'+cfg.ingredients[i].emoji+'</div>';h+='</div><div style="margin:8px"><button class="btn green" onclick="chkLab()">✓ ПРОВЕРИТЬ</button></div>';return h}
function addIg(i){var lb=window._lb;var el=document.getElementById('ig-'+i);if(el.classList.contains('used'))return;el.classList.add('used');lb.added.push(i);var liq=document.getElementById('blq');liq.style.height=Math.min(90,lb.added.length*25)+'%';liq.style.background=lb.cfg.ingredients[i].color}
function chkLab(){var lb=window._lb;var score=0;if(lb.added.length===lb.correct.length){var ok=true;for(var i=0;i<lb.correct.length;i++)if(lb.added[i]!==lb.correct[i])ok=false;score=ok?100:30}else{var m=0;for(var i=0;i<Math.min(lb.added.length,lb.correct.length);i++)if(lb.added[i]===lb.correct[i])m++;score=Math.round(m/lb.correct.length*80)}finishTask(score)}

async function finishTask(score){score=Math.max(0,Math.min(100,score));if(window._c){window._c.on=false;window._c.ts.forEach(function(t){clearInterval(t)})}if(window._sc)window._sc.on=false;var profId=S.curTask.profId,idx=S.curTask.idx;try{var d=await api('/api/task/complete',{profession_id:profId,task_index:idx,score:score});S.user=d.user;S.completed=d.completed_tasks||S.completed;S.xpN=d.xp_needed;var icon=score>=80?'🏆':score>=50?'⭐':'📝';var title=score>=80?'Отлично!':score>=50?'Хорошо!':'Можно лучше!';document.getElementById('tg-content').innerHTML='<div class="task-res"><div class="ri">'+icon+'</div><div class="rt">'+title+'</div><div class="rs">Результат: '+score+'%</div><div class="rr">+'+(d.coin_reward||0)+' 🪙  +'+(d.xp_reward||0)+' XP</div><button class="btn green" onclick="closeTask()">ПРОДОЛЖИТЬ</button></div>'}catch(e){modal('Ошибка',e.message)}}

function modal(t,txt){document.getElementById('modal-c').innerHTML='<h3>'+t+'</h3><p>'+txt+'</p><button class="btn" onclick="closeM()">ОК</button>';document.getElementById('modal').classList.add('on')}
function closeM(){document.getElementById('modal').classList.remove('on')}
init();
</script></body></html>
