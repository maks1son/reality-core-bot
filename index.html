<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RE:ALITY — Профессии</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
/* ============ ОБЩИЕ СТИЛИ ============ */
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0a0a1a;
  --bg2: #12122a;
  --bg3: #1a1a3a;
  --primary: #ffcc00;
  --secondary: #00ccff;
  --accent: #ff6699;
  --green: #33ff66;
  --red: #ff4444;
  --text: #e0e0ff;
  --text2: #8888aa;
  --pixel-border: 3px solid var(--primary);
}
body {
  font-family: 'Press Start 2P', monospace;
  background: var(--bg);
  color: var(--text);
  max-width: 420px;
  margin: 0 auto;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
/* Отключаем все нежелательные мобильные поведения */
input { font-family: 'Press Start 2P', monospace; }

/* Пиксельная рамка */
.pixel-box {
  background: var(--bg2);
  border: 3px solid var(--primary);
  box-shadow: 6px 6px 0 rgba(0,0,0,0.5), inset 0 0 20px rgba(255,204,0,0.05);
  padding: 12px;
  margin: 8px;
  image-rendering: pixelated;
}
.pixel-btn {
  font-family: 'Press Start 2P', monospace;
  background: var(--bg3);
  color: var(--primary);
  border: 3px solid var(--primary);
  padding: 10px 16px;
  font-size: 10px;
  cursor: pointer;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.5);
  transition: all 0.1s;
  text-transform: uppercase;
  width: 100%;
  text-align: center;
}
.pixel-btn:active {
  transform: translate(2px, 2px);
  box-shadow: 2px 2px 0 rgba(0,0,0,0.5);
}
.pixel-btn:disabled {
  opacity: 0.4;
  cursor: default;
}
.pixel-btn.accent { border-color: var(--accent); color: var(--accent); }
.pixel-btn.green { border-color: var(--green); color: var(--green); }
.pixel-btn.secondary { border-color: var(--secondary); color: var(--secondary); }

/* Прогресс-бар */
.progress-bar {
  width: 100%;
  height: 14px;
  background: var(--bg);
  border: 2px solid var(--text2);
  position: relative;
  overflow: hidden;
}
.progress-bar .fill {
  height: 100%;
  transition: width 0.3s;
}
.progress-bar .fill.xp { background: var(--secondary); }
.progress-bar .fill.energy { background: var(--green); }

/* Скрытие экранов */
.screen { display: none; flex-direction: column; min-height: 100vh; padding-bottom: 70px; }
.screen.active { display: flex; }

/* Нижняя навигация */
#navbar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 420px;
  display: flex;
  background: var(--bg2);
  border-top: 3px solid var(--primary);
  z-index: 100;
}
#navbar .nav-btn {
  flex: 1;
  padding: 8px 4px;
  text-align: center;
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  color: var(--text2);
  background: none;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
}
#navbar .nav-btn.active { color: var(--primary); background: var(--bg3); }
#navbar .nav-btn span { display: block; font-size: 16px; margin-bottom: 2px; }

/* ============ ЭКРАН РЕГИСТРАЦИИ ============ */
#register-screen {
  justify-content: center;
  align-items: center;
  padding: 16px;
}
#register-screen h1 {
  font-size: 16px;
  color: var(--primary);
  text-align: center;
  margin-bottom: 4px;
  text-shadow: 2px 2px 0 #664400;
}
#register-screen .subtitle {
  font-size: 8px;
  color: var(--secondary);
  text-align: center;
  margin-bottom: 16px;
}
.avatar-select {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin: 12px 0;
}
.avatar-option {
  width: 80px;
  height: 80px;
  border: 3px solid var(--text2);
  cursor: pointer;
  image-rendering: pixelated;
  transition: all 0.2s;
  background: var(--bg3);
  padding: 4px;
}
.avatar-option.selected {
  border-color: var(--primary);
  box-shadow: 0 0 12px rgba(255,204,0,0.5);
  transform: scale(1.1);
}
.avatar-option img { width: 100%; height: 100%; image-rendering: pixelated; object-fit: contain; }
.name-input {
  width: 100%;
  background: var(--bg);
  border: 3px solid var(--secondary);
  color: var(--text);
  padding: 10px;
  font-size: 12px;
  text-align: center;
  outline: none;
}
.name-input:focus { border-color: var(--primary); }
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin: 12px 0;
}
.stat-item {
  background: var(--bg3);
  border: 2px solid var(--text2);
  padding: 8px;
  text-align: center;
}
.stat-item .stat-name { font-size: 7px; color: var(--secondary); margin-bottom: 6px; display: block; }
.stat-item .stat-controls { display: flex; align-items: center; justify-content: center; gap: 8px; }
.stat-item .stat-val { font-size: 14px; color: var(--primary); min-width: 24px; }
.stat-item button {
  font-family: 'Press Start 2P', monospace;
  width: 28px;
  height: 28px;
  background: var(--bg);
  color: var(--primary);
  border: 2px solid var(--primary);
  cursor: pointer;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.stat-item button:disabled { opacity: 0.3; }
.points-left { font-size: 9px; color: var(--accent); text-align: center; margin: 6px 0; }

/* ============ ГЛАВНЫЙ ЭКРАН (ТАПАЛКА) ============ */
#main-screen { padding: 8px; }
.top-panel {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px;
}
.top-panel .user-info { flex: 1; }
.top-panel .user-name { font-size: 10px; color: var(--primary); }
.top-panel .user-level { font-size: 7px; color: var(--secondary); margin-top: 2px; }
.top-panel .user-avatar {
  width: 40px;
  height: 40px;
  image-rendering: pixelated;
  border: 2px solid var(--primary);
}

.resources-bar {
  display: flex;
  gap: 6px;
  padding: 6px 8px;
  flex-wrap: wrap;
}
.resource {
  background: var(--bg3);
  border: 2px solid var(--text2);
  padding: 5px 8px;
  font-size: 7px;
  display: flex;
  align-items: center;
  gap: 4px;
  flex: 1;
  min-width: 80px;
}
.resource .r-icon { font-size: 12px; }
.resource .r-val { color: var(--primary); }

.xp-section { padding: 4px 8px; }
.xp-label { font-size: 7px; color: var(--text2); margin-bottom: 3px; }

.tap-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px;
  min-height: 300px;
  position: relative;
}
.tap-character {
  width: 140px;
  height: 140px;
  image-rendering: pixelated;
  cursor: pointer;
  animation: breathe 2s ease-in-out infinite;
  transition: transform 0.08s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.tap-character:active { transform: scale(0.92); }
@keyframes breathe {
  0%, 100% { transform: scaleY(1); }
  50% { transform: scaleY(1.03); }
}

.energy-section { padding: 4px 16px; width: 100%; }
.energy-label { font-size: 7px; color: var(--text2); margin-bottom: 3px; display: flex; justify-content: space-between; }

.combo-display {
  font-size: 10px;
  color: var(--accent);
  text-align: center;
  margin-top: 8px;
  min-height: 16px;
}

/* Анимация получения монет */
.coin-popup {
  position: absolute;
  font-size: 12px;
  color: var(--primary);
  pointer-events: none;
  animation: coinFloat 0.8s ease-out forwards;
  text-shadow: 1px 1px 0 #000;
  z-index: 50;
}
@keyframes coinFloat {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
}

/* ============ ЭКРАН ПРОФЕССИЙ ============ */
#professions-screen { padding: 8px; }
#professions-screen h2 {
  font-size: 12px;
  color: var(--primary);
  text-align: center;
  margin: 8px;
}
.spheres-list { display: flex; flex-direction: column; gap: 8px; padding: 4px; }
.sphere-card {
  background: var(--bg2);
  border: 3px solid var(--text2);
  padding: 12px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 10px;
}
.sphere-card:active { border-color: var(--primary); transform: scale(0.98); }
.sphere-card .s-icon { font-size: 28px; }
.sphere-card .s-name { font-size: 9px; color: var(--text); }
.sphere-card .s-count { font-size: 7px; color: var(--text2); margin-top: 3px; }

/* Список профессий в сфере */
.prof-list { display: flex; flex-direction: column; gap: 6px; padding: 4px; }
.prof-card {
  background: var(--bg3);
  border: 2px solid var(--text2);
  padding: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: all 0.2s;
}
.prof-card.unlocked { border-color: var(--green); }
.prof-card .p-icon { font-size: 22px; }
.prof-card .p-info { flex: 1; }
.prof-card .p-name { font-size: 8px; color: var(--text); }
.prof-card .p-status { font-size: 6px; margin-top: 3px; }
.prof-card .p-status.locked { color: var(--accent); }
.prof-card .p-status.open { color: var(--green); }

/* Детальный экран профессии */
.prof-detail { padding: 4px; }
.prof-detail .pd-header { text-align: center; margin: 8px 0; }
.prof-detail .pd-icon { font-size: 40px; }
.prof-detail .pd-name { font-size: 11px; color: var(--primary); margin: 6px 0; }
.prof-detail .pd-desc { font-size: 7px; color: var(--text2); line-height: 1.6; }
.pd-tools { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin: 10px 0; }
.pd-tools .tool-tag {
  background: var(--bg);
  border: 1px solid var(--secondary);
  color: var(--secondary);
  font-size: 6px;
  padding: 4px 8px;
}
.task-list { display: flex; flex-direction: column; gap: 6px; }
.task-card {
  background: var(--bg3);
  border: 2px solid var(--text2);
  padding: 10px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.task-card.completed { border-color: var(--green); opacity: 0.7; }
.task-card.locked { opacity: 0.4; cursor: default; }
.task-card .t-num {
  width: 28px;
  height: 28px;
  border: 2px solid var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: var(--primary);
  flex-shrink: 0;
}
.task-card.completed .t-num { border-color: var(--green); color: var(--green); }
.task-card .t-info { flex: 1; }
.task-card .t-title { font-size: 8px; color: var(--text); }
.task-card .t-desc { font-size: 6px; color: var(--text2); margin-top: 3px; }

.back-btn {
  background: none;
  border: none;
  color: var(--secondary);
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  cursor: pointer;
  padding: 8px;
  display: flex;
  align-items: center;
  gap: 4px;
}

/* ============ ЭКРАН УЛУЧШЕНИЙ ============ */
#upgrades-screen { padding: 8px; }
#upgrades-screen h2 { font-size: 12px; color: var(--primary); text-align: center; margin: 8px; }
.upgrade-list { display: flex; flex-direction: column; gap: 8px; padding: 4px; }
.upgrade-card {
  background: var(--bg2);
  border: 3px solid var(--text2);
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.upgrade-card .u-header { display: flex; align-items: center; gap: 8px; }
.upgrade-card .u-icon { font-size: 24px; }
.upgrade-card .u-name { font-size: 9px; color: var(--text); }
.upgrade-card .u-level { font-size: 7px; color: var(--secondary); margin-top: 2px; }
.upgrade-card .u-desc { font-size: 7px; color: var(--text2); line-height: 1.4; }
.upgrade-card .u-cost { font-size: 8px; color: var(--primary); }

/* ============ ЭКРАН ЗАДАНИЯ (МИНИ-ИГРА) ============ */
#task-screen { padding: 8px; }
.task-game { padding: 8px; }
.task-game h3 { font-size: 10px; color: var(--primary); text-align: center; margin: 8px 0; }
.task-game .task-desc { font-size: 7px; color: var(--text2); text-align: center; margin-bottom: 12px; line-height: 1.6; }
.task-game .task-content { min-height: 200px; }

/* Quiz задание */
.quiz-question { font-size: 8px; color: var(--text); line-height: 1.6; margin-bottom: 12px; }
.quiz-options { display: flex; flex-direction: column; gap: 8px; }
.quiz-opt {
  font-family: 'Press Start 2P', monospace;
  background: var(--bg3);
  border: 2px solid var(--text2);
  color: var(--text);
  padding: 10px;
  font-size: 7px;
  text-align: left;
  cursor: pointer;
  transition: all 0.2s;
  line-height: 1.5;
}
.quiz-opt:active { border-color: var(--primary); }
.quiz-opt.correct { border-color: var(--green); color: var(--green); background: rgba(51,255,102,0.1); }
.quiz-opt.wrong { border-color: var(--red); color: var(--red); background: rgba(255,68,68,0.1); }

/* Find Bug задание */
.code-block {
  background: var(--bg);
  border: 2px solid var(--text2);
  padding: 10px;
  font-size: 7px;
  line-height: 1.8;
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-all;
}
.code-line {
  padding: 3px 6px;
  cursor: pointer;
  transition: background 0.2s;
  display: block;
}
.code-line:hover { background: rgba(255,204,0,0.1); }
.code-line.selected { background: rgba(255,204,0,0.2); border-left: 3px solid var(--primary); }
.code-line.bug-found { background: rgba(51,255,102,0.2); border-left: 3px solid var(--green); }
.code-line.bug-wrong { background: rgba(255,68,68,0.2); border-left: 3px solid var(--red); }

/* Drag & Arrange задание */
.drag-container { display: flex; flex-direction: column; gap: 6px; }
.drag-item {
  background: var(--bg3);
  border: 2px solid var(--secondary);
  padding: 10px;
  font-size: 7px;
  cursor: grab;
  touch-action: none;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
  line-height: 1.4;
}
.drag-item:active { cursor: grabbing; border-color: var(--primary); }
.drag-item .drag-handle { color: var(--text2); font-size: 10px; }
.drag-item.dragging { opacity: 0.5; border-color: var(--primary); }

/* Color Pick задание */
.color-palette { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 10px 0; }
.color-swatch {
  width: 100%;
  aspect-ratio: 1;
  border: 3px solid var(--text2);
  cursor: pointer;
  transition: all 0.2s;
}
.color-swatch.selected { border-color: var(--primary); transform: scale(1.1); box-shadow: 0 0 10px rgba(255,204,0,0.5); }
.color-swatch.correct { border-color: var(--green); }
.color-swatch.wrong { border-color: var(--red); opacity: 0.5; }

/* Code Match задание */
.code-slots { display: flex; flex-direction: column; gap: 4px; margin: 8px 0; }
.code-slot {
  background: var(--bg);
  border: 2px dashed var(--text2);
  padding: 8px;
  font-size: 7px;
  min-height: 30px;
  display: flex;
  align-items: center;
  color: var(--text2);
}
.code-slot.filled { border-style: solid; border-color: var(--secondary); color: var(--text); }
.code-pieces { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
.code-piece {
  background: var(--bg3);
  border: 2px solid var(--secondary);
  padding: 6px 10px;
  font-size: 7px;
  cursor: pointer;
  transition: all 0.2s;
}
.code-piece.used { opacity: 0.3; cursor: default; }
.code-piece:active { border-color: var(--primary); }

/* Результат задания */
.task-result {
  text-align: center;
  padding: 20px;
}
.task-result .result-icon { font-size: 40px; margin-bottom: 12px; }
.task-result .result-title { font-size: 12px; color: var(--primary); margin-bottom: 8px; }
.task-result .result-score { font-size: 9px; color: var(--secondary); margin-bottom: 6px; }
.task-result .result-rewards { font-size: 8px; color: var(--green); margin-bottom: 16px; }

/* Модальное окно */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.8);
  z-index: 200;
  justify-content: center;
  align-items: center;
  padding: 16px;
}
.modal-overlay.active { display: flex; }
.modal-box {
  background: var(--bg2);
  border: 3px solid var(--primary);
  padding: 20px;
  max-width: 340px;
  width: 100%;
  text-align: center;
  box-shadow: 8px 8px 0 rgba(0,0,0,0.5);
}
.modal-box h3 { font-size: 10px; color: var(--primary); margin-bottom: 10px; }
.modal-box p { font-size: 7px; color: var(--text2); line-height: 1.6; margin-bottom: 14px; }

/* Загрузка */
#loading {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 999;
}
#loading h1 { font-size: 16px; color: var(--primary); margin-bottom: 8px; text-shadow: 2px 2px 0 #664400; }
#loading p { font-size: 8px; color: var(--secondary); animation: blink 1s infinite; }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

/* Скроллбар */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--primary); }
</style>
</head>
<body>

<!-- Загрузка -->
<div id="loading">
  <h1>RE:ALITY</h1>
  <p>Загрузка...</p>
</div>

<!-- Модальное окно -->
<div class="modal-overlay" id="modal">
  <div class="modal-box" id="modal-content"></div>
</div>

<!-- ========== ЭКРАН РЕГИСТРАЦИИ ========== -->
<div class="screen" id="register-screen">
  <h1>RE:ALITY</h1>
  <div class="subtitle">ПРОФЕССИИ</div>

  <div class="pixel-box">
    <div style="font-size:8px;color:var(--secondary);text-align:center;margin-bottom:10px;">ВЫБЕРИ АВАТАР</div>
    <div class="avatar-select">
      <div class="avatar-option selected" data-avatar="1" onclick="selectAvatar(1)"><img src="/hero1.png" alt="Hero 1"></div>
      <div class="avatar-option" data-avatar="2" onclick="selectAvatar(2)"><img src="/hero2.png" alt="Hero 2"></div>
      <div class="avatar-option" data-avatar="3" onclick="selectAvatar(3)"><img src="/hero3.png" alt="Hero 3"></div>
    </div>
  </div>

  <div class="pixel-box">
    <div style="font-size:8px;color:var(--secondary);text-align:center;margin-bottom:10px;">ИМЯ ГЕРОЯ</div>
    <input type="text" class="name-input" id="name-input" maxlength="8" placeholder="Макс 8 букв">
  </div>

  <div class="pixel-box">
    <div style="font-size:8px;color:var(--secondary);text-align:center;margin-bottom:6px;">ХАРАКТЕРИСТИКИ</div>
    <div class="points-left">Осталось очков: <span id="points-left">0</span></div>
    <div class="stats-grid">
      <div class="stat-item">
        <span class="stat-name">💪 СИЛА</span>
        <div class="stat-controls">
          <button onclick="changeStat('str',-1)">-</button>
          <span class="stat-val" id="stat-str">5</span>
          <button onclick="changeStat('str',1)">+</button>
        </div>
      </div>
      <div class="stat-item">
        <span class="stat-name">🧠 ИНТЕЛЛЕКТ</span>
        <div class="stat-controls">
          <button onclick="changeStat('int',-1)">-</button>
          <span class="stat-val" id="stat-int">5</span>
          <button onclick="changeStat('int',1)">+</button>
        </div>
      </div>
      <div class="stat-item">
        <span class="stat-name">🗣 ХАРИЗМА</span>
        <div class="stat-controls">
          <button onclick="changeStat('cha',-1)">-</button>
          <span class="stat-val" id="stat-cha">5</span>
          <button onclick="changeStat('cha',1)">+</button>
        </div>
      </div>
      <div class="stat-item">
        <span class="stat-name">🍀 УДАЧА</span>
        <div class="stat-controls">
          <button onclick="changeStat('luck',-1)">-</button>
          <span class="stat-val" id="stat-luck">5</span>
          <button onclick="changeStat('luck',1)">+</button>
        </div>
      </div>
    </div>
  </div>

  <div style="padding:8px;">
    <button class="pixel-btn green" onclick="doRegister()">⚔️ НАЧАТЬ ПУТЬ ⚔️</button>
  </div>
</div>

<div class="screen" id="professions-screen">
  <h2>🏢 ПРОФЕССИИ</h2>
  <div id="prof-content">
    <!-- Заполняется динамически -->
  </div>
</div>

<div class="screen" id="upgrades-screen">
  <h2>⬆️ УЛУЧШЕНИЯ</h2>
  <div style="padding:4px 8px;">
    <div class="resource" style="justify-content:center;margin-bottom:8px;">
      <span class="r-icon">🪙</span><span class="r-val" id="upg-coins">0</span>

  </div>
  <div class="upgrade-list" id="upgrade-list">

  </div>

  <button class="back-btn" onclick="closeTask()">← НАЗАД</button>

    <!-- Заполняется динамически -->
  </div>

<!-- Навигация -->
<div id="navbar" style="display:none;">
  <button class="nav-btn" onclick="showScreen('professions')"><span>🏢</span>Профессии</button>
  <button class="nav-btn active" onclick="showScreen('main')"><span>👆</span>Тапалка</button>
  <button class="nav-btn" onclick="showScreen('upgrades')"><span>⬆️</span>Улучшения</button>
</div>

<script>
// ============ ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ============
let STATE = {
  user: null,
  unlocked: [],
  completed: [],
  xpNeeded: 100,
  professions: [],
  tgId: 0,
  initData: '',
  selectedAvatar: 1,
  stats: { str: 5, int: 5, cha: 5, luck: 5 },
  currentSphere: null,
  currentProf: null,
  currentTask: null,
  energyTimer: null,
};

// Получаем Telegram данные
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  STATE.initData = tg.initData || '';
  if (tg.initDataUnsafe?.user) {
    STATE.tgId = tg.initDataUnsafe.user.id;
  }
  // Тёмная тема
  document.body.style.setProperty('--bg', tg.themeParams?.bg_color || '#0a0a1a');
}

// Для тестирования без Telegram
if (!STATE.tgId) {
  STATE.tgId = Math.floor(Math.random() * 999999) + 100000;
}

// ============ API ============
const API = '';

async function apiCall(endpoint, body = {}) {
  body.tg_id = STATE.tgId;
  body.init_data = STATE.initData;
  try {
    const r = await fetch(API + endpoint, {
      method: endpoint.includes('professions') ? 'GET' : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: endpoint.includes('professions') ? undefined : JSON.stringify(body)
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${r.status}`);
    }
    return await r.json();
  } catch (e) {
    console.error('API Error:', e);
    throw e;
  }
}

// ============ ИНИЦИАЛИЗАЦИЯ ============
async function init() {
  try {
    // Загрузить профессии
    const profData = await apiCall('/api/professions');
    STATE.professions = profData.spheres;

    // Авторизация
    const data = await apiCall('/api/auth');
    STATE.user = data.user;
    STATE.unlocked = data.unlocked_professions || [];
    STATE.completed = data.completed_tasks || [];
    STATE.xpNeeded = data.xp_needed;

    document.getElementById('loading').style.display = 'none';

    if (!STATE.user.registered) {
      showScreen('register');
    } else {
      showScreen('main');
      document.getElementById('navbar').style.display = 'flex';
      startEnergyRegen();
    }
  } catch (e) {
    document.getElementById('loading').innerHTML = `
      <h1>RE:ALITY</h1>
      <p style="color:var(--red)">Ошибка: ${e.message}</p>
      <br>
      <button class="pixel-btn" onclick="location.reload()" style="width:auto;padding:10px 20px;">Перезагрузить</button>
    `;
  }
}

// ============ НАВИГАЦИЯ ============
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

  const screen = document.getElementById(name + '-screen');
  if (screen) screen.classList.add('active');

  // Подсветка навигации
  const navBtns = document.querySelectorAll('.nav-btn');
  if (name === 'professions') navBtns[0]?.classList.add('active');
  else if (name === 'main') navBtns[1]?.classList.add('active');
  else if (name === 'upgrades') navBtns[2]?.classList.add('active');

  // Обновить данные при открытии
  if (name === 'main') updateMainScreen();
  if (name === 'professions') renderSpheres();
  if (name === 'upgrades') renderUpgrades();
}

// ============ РЕГИСТРАЦИЯ ============
function selectAvatar(n) {
  STATE.selectedAvatar = n;
  document.querySelectorAll('.avatar-option').forEach(el => {
    el.classList.toggle('selected', parseInt(el.dataset.avatar) === n);
  });
}

function changeStat(stat, delta) {
  const total = STATE.stats.str + STATE.stats.int + STATE.stats.cha + STATE.stats.luck;
  const newVal = STATE.stats[stat] + delta;
  if (newVal < 1 || newVal > 14) return;
  if (delta > 0 && total >= 20) return;
  if (delta < 0 && total <= 4) return;
  STATE.stats[stat] = newVal;
  document.getElementById('stat-' + stat).textContent = newVal;
  const left = 20 - (STATE.stats.str + STATE.stats.int + STATE.stats.cha + STATE.stats.luck);
  document.getElementById('points-left').textContent = left;
}

async function doRegister() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) { showModal('Ошибка', 'Введи имя героя!'); return; }
  if (name.length > 8) { showModal('Ошибка', 'Максимум 8 символов!'); return; }

  const total = STATE.stats.str + STATE.stats.int + STATE.stats.cha + STATE.stats.luck;
  if (total !== 20) { showModal('Ошибка', `Распредели все 20 очков! (сейчас ${total})`); return; }

  try {
    const data = await apiCall('/api/register', {
      name: name,
      avatar: STATE.selectedAvatar,
      stats: STATE.stats
    });
    STATE.user = data.user;
    STATE.xpNeeded = data.xp_needed;
    showScreen('main');
    document.getElementById('navbar').style.display = 'flex';
    startEnergyRegen();
    showModal('Добро пожаловать!', `${name}, твой путь начинается! Тапай по персонажу, чтобы зарабатывать монеты и опыт. Открывай профессии и выполняй задания!`);
  } catch (e) {
    showModal('Ошибка', e.message);
  }
}

// ============ ГЛАВНЫЙ ЭКРАН ============
function updateMainScreen() {
  const u = STATE.user;
  if (!u) return;
  document.getElementById('main-avatar').src = `/hero${u.avatar}.png`;
  document.getElementById('tap-char').src = `/hero${u.avatar}.png`;
  document.getElementById('main-name').textContent = u.name;
  document.getElementById('main-level').textContent = `УР. ${u.level}`;
  document.getElementById('main-xp-text').textContent = `${u.xp}/${STATE.xpNeeded}`;
  document.getElementById('main-xp-bar').style.width = `${Math.min(100, (u.xp / STATE.xpNeeded) * 100)}%`;
  document.getElementById('res-coins').textContent = formatNum(u.coins);
  document.getElementById('res-tokens').textContent = u.tokens;
  document.getElementById('res-energy').textContent = `${u.energy}/${u.max_energy}`;
  document.getElementById('energy-text').textContent = `${u.energy}/${u.max_energy}`;
  document.getElementById('energy-bar').style.width = `${(u.energy / u.max_energy) * 100}%`;
}

function formatNum(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return n.toString();
}

// ============ ТАПАЛКА ============
let tapCooldown = false;
let tapQueue = 0;
let tapSendTimer = null;

document.getElementById('tap-area').addEventListener('pointerdown', function(e) {
  e.preventDefault();
  if (!STATE.user || !STATE.user.registered) return;
  if (STATE.user.energy <= 0) return;

  // Локальная анимация
  STATE.user.energy = Math.max(0, STATE.user.energy - 1);
  const earned = STATE.user.coins_per_tap;
  STATE.user.coins += earned;
  updateMainScreen();

  // Попап монет
  showCoinPopup(e, '+' + earned);

  // Собираем тапы в пакет
  tapQueue++;
  if (tapSendTimer) clearTimeout(tapSendTimer);
  tapSendTimer = setTimeout(sendTaps, 300);
});

async function sendTaps() {
  if (tapQueue <= 0) return;
  const taps = tapQueue;
  tapQueue = 0;
  try {
    const data = await apiCall('/api/tap', { taps: taps });
    STATE.user = data.user;
    STATE.xpNeeded = data.xp_needed;
    updateMainScreen();

    // Комбо
    if (data.combo > 1) {
      document.getElementById('combo-display').textContent = `🔥 COMBO x${data.combo}`;
      document.getElementById('combo-display').style.color = data.combo >= 4 ? 'var(--accent)' : 'var(--primary)';
    } else {
      document.getElementById('combo-display').textContent = '';
    }

    // Левел-ап
    if (data.level_up) {
      showModal('⬆️ УРОВЕНЬ!', `Поздравляем! Ты достиг ${STATE.user.level} уровня! +1 токен профессии.`);
      if (STATE.user.level === 2) {
        setTimeout(() => {
          showModal('🎫 Токены профессий', 'Теперь ты можешь открывать профессии за токены! Перейди в раздел "Профессии" и попробуй себя в настоящих задачах.');
        }, 2000);
      }
    }
  } catch (e) {
    console.error('Tap error:', e);
  }
}

function showCoinPopup(e, text) {
  const area = document.getElementById('tap-area');
  const rect = area.getBoundingClientRect();
  const popup = document.createElement('div');
  popup.className = 'coin-popup';
  popup.textContent = text;
  popup.style.left = (e.clientX - rect.left - 15) + 'px';
  popup.style.top = (e.clientY - rect.top - 15) + 'px';
  area.appendChild(popup);
  setTimeout(() => popup.remove(), 800);
}

// Регенерация энергии (клиентская)
function startEnergyRegen() {
  if (STATE.energyTimer) clearInterval(STATE.energyTimer);
  STATE.energyTimer = setInterval(() => {
    if (!STATE.user) return;
    if (STATE.user.energy < STATE.user.max_energy) {
      STATE.user.energy = Math.min(STATE.user.max_energy, STATE.user.energy + 1);
      updateMainScreen();
    }
  }, 500); // 2 ед/сек = +1 каждые 500мс
}

// ============ ПРОФЕССИИ ============
function renderSpheres() {
  STATE.currentSphere = null;
  STATE.currentProf = null;
  const cont = document.getElementById('prof-content');
  let html = '<div class="spheres-list">';
  for (const s of STATE.professions) {
    html += `
      <div class="sphere-card" onclick="openSphere('${s.id}')">
        <div class="s-icon">${s.icon}</div>
        <div>
          <div class="s-name">${s.name}</div>
          <div class="s-count">${s.professions.length} профессий</div>
        </div>
      </div>`;
  }
  html += '</div>';
  cont.innerHTML = html;
}

function openSphere(sphereId) {
  const sphere = STATE.professions.find(s => s.id === sphereId);
  if (!sphere) return;
  STATE.currentSphere = sphere;

  const cont = document.getElementById('prof-content');
  let html = `<button class="back-btn" onclick="renderSpheres()">← НАЗАД</button>`;
  html += `<div style="text-align:center;margin:8px 0;font-size:10px;color:var(--primary)">${sphere.icon} ${sphere.name}</div>`;
  html += '<div class="prof-list">';
  for (const p of sphere.professions) {
    const isUnlocked = STATE.unlocked.includes(p.id);
    const completedCount = STATE.completed.filter(c => c.profession_id === p.id).length;
    html += `
      <div class="prof-card ${isUnlocked ? 'unlocked' : ''}" onclick="openProfession('${p.id}')">
        <div class="p-icon">${p.icon}</div>
        <div class="p-info">
          <div class="p-name">${p.name}</div>
          <div class="p-status ${isUnlocked ? 'open' : 'locked'}">
            ${isUnlocked ? `✓ Открыто (${completedCount}/5 заданий)` : `🔒 ${p.cost} токен`}
          </div>
        </div>
      </div>`;
  }
  html += '</div>';
  cont.innerHTML = html;
}

function openProfession(profId) {
  let prof = null;
  for (const s of STATE.professions) {
    prof = s.professions.find(p => p.id === profId);
    if (prof) break;
  }
  if (!prof) return;
  STATE.currentProf = prof;

  const isUnlocked = STATE.unlocked.includes(profId);
  const cont = document.getElementById('prof-content');
  const myCompleted = STATE.completed.filter(c => c.profession_id === profId);

  let html = `<button class="back-btn" onclick="openSphere('${STATE.currentSphere.id}')">← НАЗАД</button>`;
  html += `<div class="prof-detail">`;
  html += `<div class="pd-header">
    <div class="pd-icon">${prof.icon}</div>
    <div class="pd-name">${prof.name}</div>
    <div class="pd-desc">${prof.desc}</div>
  </div>`;

  html += `<div class="pd-tools">`;
  for (const t of prof.tools) {
    html += `<span class="tool-tag">${t}</span>`;
  }
  html += `</div>`;

  if (!isUnlocked) {
    html += `<div style="text-align:center;padding:16px;">
      <div style="font-size:8px;color:var(--text2);margin-bottom:12px;">Открой профессию, чтобы получить доступ к практическим заданиям</div>
      <button class="pixel-btn accent" onclick="unlockProfession('${profId}')">🎫 ОТКРЫТЬ ЗА ${prof.cost} ТОКЕН</button>
      <div style="font-size:7px;color:var(--text2);margin-top:8px;">У тебя: ${STATE.user.tokens} токенов</div>
    </div>`;
  } else {
    html += `<div style="font-size:9px;color:var(--secondary);text-align:center;margin:10px 0;">ЗАДАНИЯ</div>`;
    html += `<div class="task-list">`;
    for (let i = 0; i < prof.tasks.length; i++) {
      const task = prof.tasks[i];
      const done = myCompleted.find(c => c.task_index === i);
      const prevDone = i === 0 || myCompleted.find(c => c.task_index === i - 1);
      const locked = !prevDone && !done;
      html += `
        <div class="task-card ${done ? 'completed' : ''} ${locked ? 'locked' : ''}"
             onclick="${locked ? '' : (done ? '' : `startTask('${profId}', ${i})`)}">
          <div class="t-num">${done ? '✓' : i + 1}</div>
          <div class="t-info">
            <div class="t-title">${task.title}</div>
            <div class="t-desc">${locked ? '🔒 Выполни предыдущее' : task.desc}</div>
          </div>
        </div>`;
    }
    html += `</div>`;
  }

  html += `</div>`;
  cont.innerHTML = html;
}

async function unlockProfession(profId) {
  try {
    const data = await apiCall('/api/unlock', { profession_id: profId });
    STATE.user = data.user;
    STATE.unlocked = data.unlocked_professions;
    STATE.xpNeeded = data.xp_needed;
    openProfession(profId);
    showModal('✅ Открыто!', 'Профессия доступна! Выполняй задания и узнавай, как работают настоящие специалисты.');
  } catch (e) {
    showModal('Ошибка', e.message);
  }
}

// ============ УЛУЧШЕНИЯ ============
const UPGRADE_INFO = [
  { type: 'tap', name: '💪 Сила пальцев', desc: '+1 монета за тап', icon: '👆', field: 'upg_tap_level', maxLvl: 10, baseCost: 50, mult: 2.0 },
  { type: 'energy', name: '🔋 Выносливость', desc: '+20 макс. энергии', icon: '⚡', field: 'upg_energy_level', maxLvl: 10, baseCost: 80, mult: 2.2 },
  { type: 'multi', name: '✋ Мультитап', desc: '+1 одновременный тап', icon: '🖐', field: 'upg_multi_level', maxLvl: 4, baseCost: 200, mult: 2.5 },
  { type: 'regen', name: '♻️ Регенерация', desc: '+0.5 восст. энергии/сек', icon: '💚', field: 'upg_regen_level', maxLvl: 10, baseCost: 100, mult: 2.0 },
];

function renderUpgrades() {
  const u = STATE.user;
  document.getElementById('upg-coins').textContent = formatNum(u.coins);
  const cont = document.getElementById('upgrade-list');
  let html = '';
  for (const up of UPGRADE_INFO) {
    const lvl = u[up.field];
    const maxed = lvl >= up.maxLvl;
    const cost = maxed ? 0 : Math.floor(up.baseCost * Math.pow(up.mult, lvl));
    const canBuy = !maxed && u.coins >= cost;
    html += `
      <div class="upgrade-card">
        <div class="u-header">
          <div class="u-icon">${up.icon}</div>
          <div>
            <div class="u-name">${up.name}</div>
            <div class="u-level">Ур. ${lvl}/${up.maxLvl}</div>
          </div>
        </div>
        <div class="u-desc">${up.desc}</div>
        <button class="pixel-btn ${canBuy ? 'green' : ''}" ${canBuy ? '' : 'disabled'}
                onclick="buyUpgrade('${up.type}')">
          ${maxed ? 'МАКС' : `🪙 ${formatNum(cost)}`}
        </button>
      </div>`;
  }
  cont.innerHTML = html;
}

async function buyUpgrade(type) {
  try {
    const data = await apiCall('/api/upgrade', { upgrade_type: type });
    STATE.user = data.user;
    STATE.xpNeeded = data.xp_needed;
    renderUpgrades();
    updateMainScreen();
  } catch (e) {
    showModal('Ошибка', e.message);
  }
}

// ============ МИНИ-ИГРЫ / ЗАДАНИЯ ============

    { instruction: "Собери установку для измерения ускорения свободного падения:", items: ["Штатив с зажимом", "Шарик на нити (маятник)", "Линейка для длины нити", "Секундомер", "Формула T=2π√(L/g)"], correct: ["Штатив с зажимом", "Шарик на нити (маятник)", "Линейка для длины нити", "Секундомер", "Формула T=2π√(L/g)"] },
    { lines: ['Эксперимент: измерение сопротивления', 'Амперметр: 0.5 А', 'Вольтметр: 10 В', 'R = U/I = 10/0.5 = 20 Ом', 'Но вольтметр подключён параллельно амперметру', 'Итого R = 20 Ом (точно)'], bugLine: 4, explanation: 'Строка 5: вольтметр подключён неправильно! Он должен быть параллелен резистору, а не амперметру. Это даёт погрешность.' },
    { question: "Планета с массой 2M и радиусом 2R. Ускорение свободного падения?", options: ["g/2 (вдвое меньше)", "2g", "g (такое же)", "4g"], correct: 0 }
  ]
};

function getTaskData(profId, taskIdx) {
  const tasks = TASK_DATA[profId];
  if (!tasks || !tasks[taskIdx]) return null;
  return tasks[taskIdx];
}

function startTask(profId, taskIdx) {
  // Найти профессию и задание
  let prof = null;
  for (const s of STATE.professions) {
    prof = s.professions.find(p => p.id === profId);
    if (prof) break;
  }
  if (!prof) return;

  const taskMeta = prof.tasks[taskIdx];
  const taskData = getTaskData(profId, taskIdx);
  if (!taskData) {
    showModal('Упс', 'Задание в разработке!');
    return;
  }

  STATE.currentTask = { profId, taskIdx, meta: taskMeta, data: taskData };
  showScreen('task');
  document.getElementById('navbar').style.display = 'none';

  renderTask();
}

function closeTask() {
  const profId = STATE.currentTask?.profId;
  STATE.currentTask = null;
  showScreen('professions');
  document.getElementById('navbar').style.display = 'flex';
  if (profId) {
    // Вернуться к профессии
    setTimeout(() => {
      if (STATE.currentSphere) openSphere(STATE.currentSphere.id);
      setTimeout(() => openProfession(profId), 50);
    }, 50);
  }
}

function renderTask() {
  const { meta, data } = STATE.currentTask;
  const cont = document.getElementById('task-game-content');
  const type = meta.type;

  let html = `<h3>${meta.title}</h3><div class="task-desc">${meta.desc}</div><div class="task-content">`;

  if (type === 'quiz') {
    html += renderQuizTask(data);
  } else if (type === 'find_bug') {
    html += renderFindBugTask(data);
  } else if (type === 'drag_arrange') {
    html += renderDragTask(data);
  } else if (type === 'color_pick') {
    html += renderColorTask(data);
  } else if (type === 'code_match') {
    html += renderCodeMatchTask(data);
  }

  html += '</div>';
  cont.innerHTML = html;
}

// === QUIZ ===
function renderQuizTask(data) {
  let html = `<div class="quiz-question">${data.question}</div><div class="quiz-options">`;
  data.options.forEach((opt, i) => {
    html += `<button class="quiz-opt" onclick="answerQuiz(${i}, ${data.correct})">${opt}</button>`;
  });
  html += '</div>';
  return html;
}

function answerQuiz(selected, correct) {
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((btn, i) => {
    btn.onclick = null;
    if (i === correct) btn.classList.add('correct');
    if (i === selected && selected !== correct) btn.classList.add('wrong');
  });
  const score = selected === correct ? 100 : 20;
  setTimeout(() => finishTask(score), 1000);
}

// === FIND BUG ===
function renderFindBugTask(data) {
  let html = '<div class="code-block">';
  data.lines.forEach((line, i) => {
    html += `<span class="code-line" onclick="selectBugLine(${i}, ${data.bugLine})">${i + 1}. ${escapeHtml(line)}</span>`;
  });
  html += '</div><div style="font-size:7px;color:var(--text2);text-align:center;margin-top:8px;">Нажми на строку с ошибкой</div>';
  return html;
}

function selectBugLine(selected, correct) {
  const lines = document.querySelectorAll('.code-line');
  lines.forEach((el, i) => { el.onclick = null; });
  if (selected === correct) {
    lines[selected].classList.add('bug-found');
    const data = STATE.currentTask.data;
    showModal('✅ Верно!', data.explanation);
    setTimeout(() => finishTask(100), 1500);
  } else {
    lines[selected].classList.add('bug-wrong');
    lines[correct].classList.add('bug-found');
    const data = STATE.currentTask.data;
    showModal('❌ Не совсем', data.explanation);
    setTimeout(() => finishTask(30), 1500);
  }
}

// === DRAG & ARRANGE ===
function renderDragTask(data) {
  // Перемешиваем
  const shuffled = [...data.items].sort(() => Math.random() - 0.5);
  let html = `<div style="font-size:7px;color:var(--secondary);margin-bottom:8px;">${data.instruction || 'Расставь в правильном порядке:'}</div>`;
  html += '<div class="drag-container" id="drag-container">';
  shuffled.forEach((item, i) => {
    html += `<div class="drag-item" data-index="${i}" draggable="false">
      <span class="drag-handle">☰</span>
      <span>${item}</span>
    </div>`;
  });
  html += '</div>';
  html += `<div style="margin-top:12px;"><button class="pixel-btn green" onclick="checkDragOrder()">✓ ПРОВЕРИТЬ</button></div>`;
  return html;
}

// Простое перетаскивание через кнопки вверх/вниз (мобильно-дружелюбно)
function checkDragOrder() {
  const container = document.getElementById('drag-container');
  const items = container.querySelectorAll('.drag-item');
  const current = Array.from(items).map(el => el.querySelector('span:last-child').textContent);
  const correct = STATE.currentTask.data.correct;

  let score = 0;
  for (let i = 0; i < current.length; i++) {
    if (current[i] === correct[i]) score += Math.floor(100 / correct.length);
  }
  score = Math.min(100, score);
  finishTask(score);
}

// Touch-based reorder
(function() {
  let dragEl = null;
  let startY = 0;

  document.addEventListener('touchstart', function(e) {
    const handle = e.target.closest('.drag-item');
    if (!handle) return;
    dragEl = handle;
    startY = e.touches[0].clientY;
    dragEl.classList.add('dragging');
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (!dragEl) return;
    const currentY = e.touches[0].clientY;
    const diff = currentY - startY;
    const container = dragEl.parentElement;
    const items = Array.from(container.querySelectorAll('.drag-item'));
    const idx = items.indexOf(dragEl);

    if (diff > 40 && idx < items.length - 1) {
      container.insertBefore(items[idx + 1], dragEl);
      startY = currentY;
    } else if (diff < -40 && idx > 0) {
      container.insertBefore(dragEl, items[idx - 1]);
      startY = currentY;
    }
  }, { passive: true });

  document.addEventListener('touchend', function() {
    if (dragEl) {
      dragEl.classList.remove('dragging');
      dragEl = null;
    }
  });
})();

// === COLOR PICK ===
function renderColorTask(data) {
  let html = `<div class="quiz-question">${data.brief}</div>`;
  html += `<div style="font-size:7px;color:var(--text2);margin-bottom:8px;">Выбери ${data.needSelect} цвета:</div>`;
  html += '<div class="color-palette">';
  data.colors.forEach((color, i) => {
    html += `<div class="color-swatch" style="background:${color}" data-idx="${i}" onclick="toggleColor(this, ${i})"></div>`;
  });
  html += '</div>';
  html += `<div style="margin-top:12px;"><button class="pixel-btn green" onclick="checkColors()">✓ ПРОВЕРИТЬ</button></div>`;
  return html;
}

let selectedColors = [];
function toggleColor(el, idx) {
  const data = STATE.currentTask.data;
  if (el.classList.contains('selected')) {
    el.classList.remove('selected');
    selectedColors = selectedColors.filter(i => i !== idx);
  } else {
    if (selectedColors.length >= data.needSelect) return;
    el.classList.add('selected');
    selectedColors.push(idx);
  }
}

function checkColors() {
  const data = STATE.currentTask.data;
  const correct = data.correct;
  let matched = 0;
  selectedColors.forEach(s => { if (correct.includes(s)) matched++; });
  const score = Math.floor((matched / correct.length) * 100);

  document.querySelectorAll('.color-swatch').forEach((el, i) => {
    if (correct.includes(i)) el.classList.add('correct');
    else if (selectedColors.includes(i)) el.classList.add('wrong');
  });

  setTimeout(() => finishTask(score), 1000);
}

// === CODE MATCH ===
function renderCodeMatchTask(data) {
  let html = `<div class="quiz-question">${data.question || 'Заполни пропуски:'}</div>`;
  html += '<div class="code-slots" id="code-slots">';
  let slotIdx = 0;
  data.slots.forEach(slot => {
    if (slot.includes('____')) {
      html += `<div class="code-slot" data-slot="${slotIdx}" onclick="clearSlot(${slotIdx})">${slot.replace('____', '<span class="slot-val" id="slot-${slotIdx}">???</span>')}</div>`;
      slotIdx++;
    } else {
      html += `<div class="code-slot filled" style="color:var(--text2)">${slot}</div>`;
    }
  });
  html += '</div>';
  html += '<div class="code-pieces" id="code-pieces">';
  data.pieces.forEach((piece, i) => {
    html += `<div class="code-piece" data-piece="${i}" onclick="placePiece(${i})">${piece}</div>`;
  });
  html += '</div>';
  html += `<div style="margin-top:12px;"><button class="pixel-btn green" onclick="checkCodeMatch()">✓ ПРОВЕРИТЬ</button></div>`;
  window._codeSlots = new Array(slotIdx).fill(null);
  window._nextSlot = 0;
  selectedColors = []; // Reset
  return html;
}

function placePiece(pieceIdx) {
  const data = STATE.currentTask.data;
  const piece = document.querySelector(`.code-piece[data-piece="${pieceIdx}"]`);
  if (piece.classList.contains('used')) return;
  if (window._nextSlot >= window._codeSlots.length) return;

  piece.classList.add('used');
  window._codeSlots[window._nextSlot] = data.pieces[pieceIdx];
  document.getElementById('slot-' + window._nextSlot).textContent = data.pieces[pieceIdx];
  document.querySelector(`.code-slot[data-slot="${window._nextSlot}"]`).classList.add('filled');
  window._nextSlot++;
}

function clearSlot(idx) {
  // Упрощённый сброс всех слотов
  window._codeSlots.fill(null);
  window._nextSlot = 0;
  document.querySelectorAll('.slot-val').forEach(el => el.textContent = '???');
  document.querySelectorAll('.code-slot[data-slot]').forEach(el => el.classList.remove('filled'));
  document.querySelectorAll('.code-piece').forEach(el => el.classList.remove('used'));
}

function checkCodeMatch() {
  const data = STATE.currentTask.data;
  const correct = data.correct;
  let matched = 0;
  window._codeSlots.forEach((val, i) => {
    if (val === correct[i]) matched++;
  });
  const score = Math.floor((matched / correct.length) * 100);
  finishTask(score);
}

// === РЕЗУЛЬТАТ ЗАДАНИЯ ===
async function finishTask(score) {
  const { profId, taskIdx } = STATE.currentTask;

  try {
    const data = await apiCall('/api/task/complete', {
      profession_id: profId,
      task_index: taskIdx,
      score: score
    });
    STATE.user = data.user;
    STATE.completed = data.completed_tasks || STATE.completed;
    STATE.xpNeeded = data.xp_needed;

    const cont = document.getElementById('task-game-content');
    const icon = score >= 80 ? '🏆' : score >= 50 ? '⭐' : '📝';
    const title = score >= 80 ? 'Отлично!' : score >= 50 ? 'Хорошо!' : 'Попробуй ещё!';

    cont.innerHTML = `
      <div class="task-result">
        <div class="result-icon">${icon}</div>
        <div class="result-title">${title}</div>
        <div class="result-score">Результат: ${score}%</div>
        <div class="result-rewards">+${data.coin_reward || 0} 🪙  +${data.xp_reward || 0} XP</div>
        <button class="pixel-btn green" onclick="closeTask()">ПРОДОЛЖИТЬ</button>
      </div>`;
  } catch (e) {
    showModal('Ошибка', e.message);
  }
}

// ============ УТИЛИТЫ ============

function showModal(title, text) {
  const modal = document.getElementById('modal');
  document.getElementById('modal-content').innerHTML = `
    <h3>${title}</h3>
    <p>${text}</p>
    <button class="pixel-btn" onclick="closeModal()">ОК</button>
  `;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ============ СТАРТ ============
init();
</script>
