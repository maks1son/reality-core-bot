<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>REALITY: Профессии</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f1a;--card:#1a1a2e;--accent:#7c6cf0;--mint:#4ecdc4;
  --text:#e8e8f0;--border:#2a2a4a;--danger:#ff6b6b;
}
html,body{
  height:100%;width:100%;overflow:hidden;
  background:var(--bg);color:var(--text);
  font-family:'Press Start 2P',monospace;font-size:10px;
}
body{display:flex;justify-content:center}
.app{width:100%;max-width:420px;height:100%;display:flex;flex-direction:column;position:relative;overflow:hidden}
.screen{display:none;flex:1;flex-direction:column;overflow-y:auto;overflow-x:hidden;padding:12px;padding-bottom:70px}
.screen.active{display:flex}

/* ─── Регистрация ─── */
#screen-register{align-items:center;justify-content:center;gap:20px;text-align:center}
#screen-register h1{font-size:14px;color:var(--accent);line-height:1.6}
.avatar-row{display:flex;gap:12px;justify-content:center}
.avatar-pick{width:90px;height:90px;border-radius:16px;border:3px solid var(--border);cursor:pointer;transition:.2s;object-fit:cover;image-rendering:pixelated}
.avatar-pick.selected{border-color:var(--accent);box-shadow:0 0 16px rgba(124,108,240,.5);transform:scale(1.08)}
.reg-input{
  background:var(--card);border:2px solid var(--border);border-radius:12px;
  color:var(--text);font-family:'Press Start 2P',monospace;font-size:10px;
  padding:12px 14px;width:220px;text-align:center;outline:none;
}
.reg-input:focus{border-color:var(--accent)}
.btn{
  background:var(--accent);color:#fff;border:none;border-radius:12px;
  font-family:'Press Start 2P',monospace;font-size:10px;
  padding:14px 24px;cursor:pointer;transition:.15s;
}
.btn:active{transform:scale(.95);opacity:.85}
.btn:disabled{opacity:.4;cursor:default}

/* ─── Главный экран ─── */
#screen-main{gap:8px;position:relative;user-select:none;-webkit-user-select:none}

.top-bar{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.top-left{display:flex;align-items:center;gap:8px}
.top-avatar{width:32px;height:32px;border-radius:8px;image-rendering:pixelated;border:2px solid var(--border)}
.top-info{display:flex;flex-direction:column;gap:3px}
.top-name{font-size:8px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px}
.top-level{font-size:7px;color:var(--accent)}
.top-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.top-stat{font-size:7px;white-space:nowrap}

/* XP Bar */
.xp-wrap{width:100%;margin-top:4px}
.xp-label{font-size:6px;color:var(--mint);margin-bottom:3px}
.xp-bar{width:100%;height:14px;background:var(--card);border-radius:7px;border:1px solid var(--border);overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--mint));border-radius:7px;transition:width .4s ease;width:0%}

/* Energy Bar */
.energy-wrap{width:100%;margin-top:4px}
.energy-label{font-size:6px;color:var(--mint);margin-bottom:3px}
.energy-bar{width:100%;height:12px;background:var(--card);border-radius:6px;border:1px solid var(--border);overflow:hidden}
.energy-fill{height:100%;background:linear-gradient(90deg,var(--mint),#2ecc71);border-radius:6px;transition:width .3s ease;width:100%}

/* Hero */
.hero-zone{flex:1;display:flex;align-items:center;justify-content:center;position:relative;min-height:200px}
#hero{
  width:160px;height:160px;image-rendering:pixelated;
  animation:breathe 3s ease-in-out infinite;cursor:pointer;
  transition:opacity .3s;border-radius:16px;
}
#hero.tired{opacity:.5;animation:none}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}

/* Tap popup */
.tap-pop{
  position:absolute;pointer-events:none;font-size:14px;font-weight:bold;
  color:var(--mint);text-shadow:0 0 6px rgba(78,205,196,.6);
  animation:tapUp .8s ease-out forwards;z-index:50;
  font-family:'Press Start 2P',monospace;
}
@keyframes tapUp{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-70px) scale(1.3)}
}

/* Combo */
.combo{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  font-size:18px;color:var(--accent);text-shadow:0 0 12px rgba(124,108,240,.7);
  opacity:0;transition:opacity .3s;pointer-events:none;z-index:40;
}
.combo.visible{opacity:1;animation:comboPulse .4s ease}
@keyframes comboPulse{0%{transform:translateX(-50%) scale(1.4)}100%{transform:translateX(-50%) scale(1)}}

/* ─── Навигация ─── */
.nav{
  position:absolute;bottom:0;left:0;right:0;
  display:flex;background:var(--card);border-top:1px solid var(--border);
  z-index:100;
}
.nav-btn{
  flex:1;padding:14px 0 12px;text-align:center;font-family:'Press Start 2P',monospace;
  font-size:7px;color:#666;background:none;border:none;cursor:pointer;
  transition:.15s;display:flex;flex-direction:column;align-items:center;gap:4px;
}
.nav-btn .nav-icon{font-size:16px}
.nav-btn.active{color:var(--accent)}
.nav-btn:active{opacity:.7}

/* ─── Экраны-заглушки ─── */
.placeholder-screen{
  flex:1;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:16px;text-align:center;
}
.placeholder-screen .emoji{font-size:40px}
.placeholder-screen p{font-size:9px;color:#666;line-height:1.8}

/* ─── Модалка ─── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  display:none;align-items:center;justify-content:center;z-index:200;
}
.modal-overlay.active{display:flex}
.modal{
  background:var(--card);border:2px solid var(--border);border-radius:16px;
  padding:24px 20px;max-width:320px;width:90%;text-align:center;
}
.modal h2{font-size:11px;color:var(--accent);margin-bottom:14px;line-height:1.6}
.modal p{font-size:8px;line-height:1.8;margin-bottom:18px;color:#aaa}
</style>
</head>
<body>
<div class="app">

  <!-- ═══ Регистрация ═══ -->
  <div id="screen-register" class="screen">
    <h1>REALITY<br>Профессии</h1>
    <p style="font-size:8px;color:#888;line-height:1.6">Выбери аватар</p>
    <div class="avatar-row">
      <img class="avatar-pick" src="hero1.png" data-avatar="1" alt="Avatar 1">
      <img class="avatar-pick" src="hero2.png" data-avatar="2" alt="Avatar 2">
      <img class="avatar-pick" src="hero3.png" data-avatar="3" alt="Avatar 3">
    </div>
    <input class="reg-input" id="reg-name" type="text" maxlength="8" placeholder="Твоё имя">
    <button class="btn" id="btn-register" disabled>Начать путь</button>
  </div>

  <!-- ═══ Главный экран ═══ -->
  <div id="screen-main" class="screen">
    <div class="top-bar">
      <div class="top-left">
        <img class="top-avatar" id="main-avatar" src="hero1.png" alt="">
        <div class="top-info">
          <span class="top-name" id="main-name">—</span>
          <span class="top-level" id="main-level">Ур.0</span>
        </div>
      </div>
      <div class="top-right">
        <span class="top-stat" id="main-coins">🪙 0</span>
        <span class="top-stat" id="main-tokens">⚡ 0</span>
      </div>
    </div>
    <div class="xp-wrap">
      <div class="xp-label" id="xp-label">XP: 0 / 100</div>
      <div class="xp-bar"><div class="xp-fill" id="xp-fill"></div></div>
    </div>
    <div class="energy-wrap">
      <div class="energy-label" id="energy-label">⚡ 100 / 100</div>
      <div class="energy-bar"><div class="energy-fill" id="energy-fill"></div></div>
    </div>
    <div class="hero-zone" id="hero-zone">
      <div class="combo" id="combo-display">x1</div>
      <img id="hero" src="hero1.png" alt="Hero">
    </div>
  </div>

  <!-- ═══ Профессии (заглушка) ═══ -->
  <div id="screen-professions" class="screen">
    <div class="placeholder-screen">
      <div class="emoji">🔬</div>
      <p>Профессии<br>Скоро</p>
    </div>
  </div>

  <!-- ═══ Улучшения (заглушка) ═══ -->
  <div id="screen-upgrades" class="screen">
    <div class="placeholder-screen">
      <div class="emoji">⚙️</div>
      <p>Улучшения<br>Скоро</p>
    </div>
  </div>

  <!-- ═══ Навигация ═══ -->
  <div class="nav">
    <button class="nav-btn" data-screen="screen-professions"><span class="nav-icon">🔬</span>Профессии</button>
    <button class="nav-btn active" data-screen="screen-main"><span class="nav-icon">🏠</span>Главная</button>
    <button class="nav-btn" data-screen="screen-upgrades"><span class="nav-icon">⚙️</span>Улучшения</button>
  </div>

  <!-- ═══ Модалка токенов ═══ -->
  <div class="modal-overlay" id="modal-tokens">
    <div class="modal">
      <h2>🎉 Уровень 2!</h2>
      <p>Ты получил токен! Токены профессий открываются на экране Профессий!</p>
      <button class="btn" id="btn-close-modal">Понятно</button>
    </div>
  </div>
</div>

<script>
(function(){
"use strict";

// ─── Конфиг ──────────────────────────────────────────────────────────
const API = "";
let tgId = null;
let user = null;
let selectedAvatar = 0;
let tapBuffer = 0;
let tapTimer = null;
let localEnergy = 100;
let localMaxEnergy = 100;
let localAutoRegen = 2;
let levelUpShown = false;

// ─── Telegram WebApp ─────────────────────────────────────────────────
try {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
  const initData = Telegram.WebApp.initDataUnsafe;
  if (initData && initData.user && initData.user.id) {
    tgId = initData.user.id;
  }
} catch(e) {}
if (!tgId) tgId = 12345; // dev fallback

// ─── Утилиты ─────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: {"Content-Type":"application/json"} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.detail || r.statusText);
  }
  return r.json();
}

function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }

function showScreen(id) {
  $$(".screen").forEach(s => s.classList.remove("active"));
  const el = document.getElementById(id);
  if (el) el.classList.add("active");
  $$(".nav-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.screen === id);
  });
}

// ─── Инициализация ───────────────────────────────────────────────────
async function init() {
  try {
    const data = await api("GET", "/api/user/" + tgId);
    user = data.user;
    enterMain();
  } catch(e) {
    showScreen("screen-register");
  }
}

// ─── Регистрация ─────────────────────────────────────────────────────
$$(".avatar-pick").forEach(img => {
  img.addEventListener("click", () => {
    $$(".avatar-pick").forEach(i => i.classList.remove("selected"));
    img.classList.add("selected");
    selectedAvatar = parseInt(img.dataset.avatar);
    checkRegReady();
  });
});

const regName = $("#reg-name");
const btnReg = $("#btn-register");
regName.addEventListener("input", checkRegReady);

function checkRegReady() {
  btnReg.disabled = !(selectedAvatar > 0 && regName.value.trim().length > 0);
}

btnReg.addEventListener("click", async () => {
  if (btnReg.disabled) return;
  btnReg.disabled = true;
  btnReg.textContent = "...";
  try {
    const data = await api("POST", "/api/register", {
      tg_id: tgId,
      avatar: selectedAvatar,
      name: regName.value.trim()
    });
    user = data.user;
    enterMain();
  } catch(e) {
    alert(e.message);
    btnReg.disabled = false;
    btnReg.textContent = "Начать путь";
  }
});

// ─── Главный экран ───────────────────────────────────────────────────
function enterMain() {
  updateUI();
  showScreen("screen-main");
  startEnergyRegen();
}

function updateUI() {
  if (!user) return;
  const av = user.avatar || 1;
  $("#main-avatar").src = "hero" + av + ".png";
  $("#hero").src = "hero" + av + ".png";
  $("#main-name").textContent = user.username || "—";
  $("#main-level").textContent = "Ур." + (user.level || 0);
  $("#main-coins").textContent = "🪙 " + formatNum(user.coins || 0);
  $("#main-tokens").textContent = "⚡ " + (user.tokens || 0);

  localEnergy = user.energy;
  localMaxEnergy = user.max_energy || 100;
  localAutoRegen = user.auto_regen || 2;

  updateXP();
  updateEnergy();
}

function formatNum(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
  if (n >= 1000) return (n / 1000).toFixed(1) + "K";
  return n;
}

function updateXP() {
  const xp = user.xp || 0;
  const level = user.level || 0;
  const xpInLevel = xp - level * 100;
  const pct = Math.min(100, (xpInLevel / 100) * 100);
  $("#xp-fill").style.width = pct + "%";
  $("#xp-label").textContent = "XP: " + xpInLevel + " / 100";
}

function updateEnergy() {
  const pct = localMaxEnergy > 0 ? (localEnergy / localMaxEnergy) * 100 : 0;
  $("#energy-fill").style.width = Math.max(0, Math.min(100, pct)) + "%";
  $("#energy-label").textContent = "⚡ " + Math.floor(localEnergy) + " / " + localMaxEnergy;

  const hero = $("#hero");
  if (localEnergy <= 0) {
    hero.classList.add("tired");
  } else {
    hero.classList.remove("tired");
  }
}

// ─── Реген энергии (клиент) ──────────────────────────────────────────
let regenInterval = null;
function startEnergyRegen() {
  if (regenInterval) clearInterval(regenInterval);
  regenInterval = setInterval(() => {
    if (localEnergy < localMaxEnergy) {
      localEnergy = Math.min(localMaxEnergy, localEnergy + localAutoRegen);
      updateEnergy();
    }
  }, 1000);
}

// ─── Тапы ────────────────────────────────────────────────────────────
const heroZone = $("#hero-zone");

heroZone.addEventListener("pointerdown", (e) => {
  if (localEnergy <= 0) return;
  e.preventDefault();

  localEnergy = Math.max(0, localEnergy - 1);
  const mpc = user.mpc || 1;
  user.coins = (user.coins || 0) + mpc;
  user.xp = (user.xp || 0) + 1;

  // Level up check
  const newLevel = Math.floor(user.xp / 100);
  if (newLevel > user.level) {
    user.tokens = (user.tokens || 0) + (newLevel - user.level);
    user.level = newLevel;
    if (newLevel === 2 && !levelUpShown) {
      levelUpShown = true;
      $("#modal-tokens").classList.add("active");
    }
  }

  updateUI();
  spawnTapPop(e, mpc);

  tapBuffer++;
  if (!tapTimer) {
    tapTimer = setTimeout(flushTaps, 500);
  }
});

function spawnTapPop(e, amount) {
  const zone = heroZone.getBoundingClientRect();
  const pop = document.createElement("div");
  pop.className = "tap-pop";
  pop.textContent = "+" + amount;
  pop.style.left = (e.clientX - zone.left) + "px";
  pop.style.top = (e.clientY - zone.top) + "px";
  heroZone.appendChild(pop);
  pop.addEventListener("animationend", () => pop.remove());
}

async function flushTaps() {
  const count = tapBuffer;
  tapBuffer = 0;
  tapTimer = null;
  if (count <= 0) return;

  try {
    const data = await api("POST", "/api/tap", {
      tg_id: tgId,
      count: count,
      timestamp: Date.now() / 1000
    });
    // Синхронизация с сервером
    user.coins = data.coins;
    user.xp = data.xp;
    user.energy = data.energy;
    user.level = data.level;
    localEnergy = data.energy;

    updateCombo(data.combo || 1);
    updateUI();
  } catch(e) {
    // Молча игнорируем ошибки сети — UI уже обновлён оптимистично
  }
}

// ─── Комбо ───────────────────────────────────────────────────────────
let comboTimeout = null;
function updateCombo(combo) {
  const el = $("#combo-display");
  if (combo > 1) {
    el.textContent = "x" + combo;
    el.classList.add("visible");
    if (comboTimeout) clearTimeout(comboTimeout);
    comboTimeout = setTimeout(() => el.classList.remove("visible"), 2000);
  } else {
    el.classList.remove("visible");
  }
}

// ─── Модалка ─────────────────────────────────────────────────────────
$("#btn-close-modal").addEventListener("click", () => {
  $("#modal-tokens").classList.remove("active");
});

// ─── Навигация ───────────────────────────────────────────────────────
$$(".nav-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    const target = btn.dataset.screen;
    if (target) showScreen(target);
  });
});

// ─── Старт ───────────────────────────────────────────────────────────
init();

})();
</script>
</body>
</html>
